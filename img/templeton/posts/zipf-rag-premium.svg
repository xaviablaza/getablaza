<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
    <defs>
        <marker id="arrow-emerald" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M0 2 L8 5 L0 8" fill="none" stroke="#10b981" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
    </defs>
    
    <!-- Background -->
    <rect fill="#09090b"/>
    
    <!-- Title -->
    <text x="400" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle" letter-spacing="0.5">Corpus Algebra: Frequency Tables as Composable Atoms</text>
    
    <!-- Source A -->
    <g transform="translate(0, 0)">
        <rect x="70" y="60" width="220" height="105" rx="8" fill="rgba(59, 130, 246, 0.06)" stroke="#3b82f6" stroke-width="1.5"/>
        <text x="85" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#3b82f6">Source A</text>
        <line x1="70" y1="92" x2="290" y2="92" stroke="#3b82f6" stroke-opacity="0.3" stroke-width="1.5"/>
        
        <text x="85" y="112" font-family="monospace" font-size="12" fill="#d4d4d8">typescript</text>
        <text x="275" y="112" font-family="monospace" font-size="12" fill="#3b82f6" text-anchor="end">535</text>
        
        <text x="85" y="132" font-family="monospace" font-size="12" fill="#d4d4d8">monoid</text>
        <text x="275" y="132" font-family="monospace" font-size="12" fill="#3b82f6" text-anchor="end">23</text>
        
        <text x="85" y="152" font-family="monospace" font-size="12" fill="#d4d4d8">cloudformation</text>
        <text x="275" y="152" font-family="monospace" font-size="12" fill="#3b82f6" text-anchor="end">47</text>
    </g>
    
    <!-- Source B -->
    <g transform="translate(0, 0)">
        <rect x="70" y="180" width="220" height="105" rx="8" fill="rgba(99, 102, 241, 0.06)" stroke="#6366f1" stroke-width="1.5"/>
        <text x="85" y="202" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#6366f1">Source B</text>
        <line x1="70" y1="212" x2="290" y2="212" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1.5"/>
        
        <text x="85" y="232" font-family="monospace" font-size="12" fill="#d4d4d8">typescript</text>
        <text x="275" y="232" font-family="monospace" font-size="12" fill="#6366f1" text-anchor="end">12</text>
        
        <text x="85" y="252" font-family="monospace" font-size="12" fill="#d4d4d8">category theory</text>
        <text x="275" y="252" font-family="monospace" font-size="12" fill="#6366f1" text-anchor="end">61</text>
        
        <text x="85" y="272" font-family="monospace" font-size="12" fill="#d4d4d8">algebraic</text>
        <text x="275" y="272" font-family="monospace" font-size="12" fill="#6366f1" text-anchor="end">263</text>
    </g>
    
    <!-- Union Result -->
    <g transform="translate(0, 0)">
        <rect x="440" y="90" width="280" height="165" rx="8" fill="rgba(16, 185, 129, 0.08)" stroke="#10b981" stroke-width="1.5"/>
        <text x="460" y="112" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#10b981">Union (A ⊕ B)</text>
        <line x1="440" y1="122" x2="720" y2="122" stroke="#10b981" stroke-opacity="0.3" stroke-width="1.5"/>
        
        <text x="460" y="142" font-family="monospace" font-size="12" fill="#d4d4d8">typescript</text>
        <text x="700" y="142" font-family="monospace" font-size="12" fill="#10b981" text-anchor="end">547</text>
        
        <text x="460" y="162" font-family="monospace" font-size="12" fill="#d4d4d8">monoid</text>
        <text x="700" y="162" font-family="monospace" font-size="12" fill="#10b981" text-anchor="end">23</text>
        
        <text x="460" y="182" font-family="monospace" font-size="12" fill="#d4d4d8">category theory</text>
        <text x="700" y="182" font-family="monospace" font-size="12" fill="#10b981" text-anchor="end">61</text>
        
        <text x="460" y="202" font-family="monospace" font-size="12" fill="#d4d4d8">cloudformation</text>
        <text x="700" y="202" font-family="monospace" font-size="12" fill="#10b981" text-anchor="end">47</text>
        
        <text x="460" y="222" font-family="monospace" font-size="12" fill="#d4d4d8">algebraic</text>
        <text x="700" y="222" font-family="monospace" font-size="12" fill="#10b981" text-anchor="end">263</text>
    </g>
    
    <!-- Operator & Arrows -->
    <g>
        <!-- Arrows from Sources to Operator -->
        <path d="M 290 112.5 C 325 112.5, 315 172.5, 336 172.5" fill="none" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>
        <path d="M 290 232.5 C 325 232.5, 315 172.5, 336 172.5" fill="none" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>
        
        <!-- Arrow from Operator to Union -->
        <path d="M 389 172.5 L 432 172.5" fill="none" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>
        
        <!-- Operator Circle -->
        <circle cx="365" cy="172.5" r="24" fill="rgba(16, 185, 129, 0.1)" stroke="#10b981" stroke-width="1.5"/>
        <path d="M 355 172.5 H 375 M 365 162.5 V 182.5" stroke="#10b981" stroke-width="2.5" stroke-linecap="round"/>
    </g>
    
    <!-- Properties Row -->
    <g>
        <!-- Associative -->
        <rect x="110" y="300" width="180" height="50" rx="6" fill="rgba(59, 130, 246, 0.05)" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.5"/>
        <text x="200" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#e4e4e7" text-anchor="middle">Associative</text>
        <text x="200" y="338" font-family="monospace" font-size="11" fill="#3b82f6" text-anchor="middle">(A+B)+C = A+(B+C)</text>
        
        <!-- Identity -->
        <rect x="310" y="300" width="180" height="50" rx="6" fill="rgba(99, 102, 241, 0.05)" stroke="#6366f1" stroke-width="1.5" stroke-opacity="0.5"/>
        <text x="400" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#e4e4e7" text-anchor="middle">Identity</text>
        <text x="400" y="338" font-family="monospace" font-size="11" fill="#6366f1" text-anchor="middle">A + empty = A</text>
        
        <!-- Incremental -->
        <rect x="510" y="300" width="180" height="50" rx="6" fill="rgba(16, 185, 129, 0.05)" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.5"/>
        <text x="600" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#e4e4e7" text-anchor="middle">Incremental</text>
        <text x="600" y="338" font-family="monospace" font-size="11" fill="#10b981" text-anchor="middle">O(new terms)</text>
    </g>
    
    <!-- Stats Bar -->
    <g>
        <line x1="110" y1="370" x2="690" y2="370" stroke="#27272a" stroke-width="1.5"/>
        <text x="400" y="388" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#a1a1aa" text-anchor="middle" letter-spacing="0.5">1,765 docs | 91K terms | 5 unions | $0.75 total cost</text>
    </g>
</svg>