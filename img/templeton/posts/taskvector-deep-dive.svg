<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.02" stroke-width="1"/>
    </pattern>
    
    <marker id="arrowRed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 8 5 L 0 9 z" fill="#ef4444"/>
    </marker>
    
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 8 5 L 0 9 z" fill="#f59e0b"/>
    </marker>

    <linearGradient id="scaleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect fill="#09090b"/>
  <rect fill="url(#grid)"/>

  <!-- Title -->
  <text x="400" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle" letter-spacing="0.5">TaskVector: Dimensions to Failure Modes</text>

  <!-- GROUP 1: Input Quality -->
  <g transform="translate(50, 60)">
    <rect x="0" y="0" width="220" height="150" rx="8" fill="#3b82f6" fill-opacity="0.06" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="110" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#3b82f6" text-anchor="middle">Input Quality</text>
    <line x1="0" y1="42" x2="220" y2="42" stroke="#3b82f6" stroke-opacity="0.2" stroke-width="1.5"/>
    
    <circle cx="20" cy="70" r="3.5" fill="#3b82f6" opacity="0.8"/>
    <text x="35" y="74" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#e4e4e7">Input Predictability</text>
    
    <circle cx="20" cy="98" r="3.5" fill="#3b82f6" opacity="0.8"/>
    <text x="35" y="102" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#e4e4e7">Info Completeness</text>
    
    <circle cx="20" cy="126" r="3.5" fill="#3b82f6" opacity="0.8"/>
    <text x="35" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#e4e4e7">Modality Requirements</text>
  </g>

  <!-- GROUP 2: Process Complexity -->
  <g transform="translate(290, 60)">
    <rect x="0" y="0" width="220" height="150" rx="8" fill="#6366f1" fill-opacity="0.06" stroke="#6366f1" stroke-width="1.5"/>
    <text x="110" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#6366f1" text-anchor="middle">Process Complexity</text>
    <line x1="0" y1="42" x2="220" y2="42" stroke="#6366f1" stroke-opacity="0.2" stroke-width="1.5"/>
    
    <circle cx="20" cy="70" r="3.5" fill="#6366f1" opacity="0.8"/>
    <text x="35" y="74" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#e4e4e7">Task Complexity</text>
    
    <circle cx="20" cy="98" r="3.5" fill="#6366f1" opacity="0.8"/>
    <text x="35" y="102" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#e4e4e7">Decomposability</text>
    
    <circle cx="20" cy="126" r="3.5" fill="#6366f1" opacity="0.8"/>
    <text x="35" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#e4e4e7">Model Capability Fit</text>
  </g>

  <!-- GROUP 3: Feedback & Risk -->
  <g transform="translate(530, 60)">
    <rect x="0" y="0" width="220" height="150" rx="8" fill="#10b981" fill-opacity="0.06" stroke="#10b981" stroke-width="1.5"/>
    <text x="110" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#10b981" text-anchor="middle">Feedback &amp; Risk</text>
    <line x1="0" y1="42" x2="220" y2="42" stroke="#10b981" stroke-opacity="0.2" stroke-width="1.5"/>
    
    <circle cx="20" cy="70" r="3.5" fill="#10b981" opacity="0.8"/>
    <text x="35" y="74" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#e4e4e7">Feedback Speed</text>
    
    <circle cx="20" cy="98" r="3.5" fill="#10b981" opacity="0.8"/>
    <text x="35" y="102" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#e4e4e7">Check vs Do</text>
    
    <circle cx="20" cy="126" r="3.5" fill="#10b981" opacity="0.8"/>
    <text x="35" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#e4e4e7">Failure Consequences</text>
  </g>

  <!-- Connecting Arrows -->
  <line x1="160" y1="210" x2="160" y2="246" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <line x1="400" y1="210" x2="400" y2="246" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowAmber)"/>
  <line x1="640" y1="210" x2="640" y2="246" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrowRed)"/>

  <!-- Failure Modes -->
  <g transform="translate(50, 250)">
    <rect x="0" y="0" width="220" height="44" rx="6" fill="#ef4444" fill-opacity="0.08" stroke="#ef4444" stroke-width="1.5"/>
    <text x="110" y="27" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#f87171" text-anchor="middle">Hallucination Risk</text>
  </g>

  <g transform="translate(290, 250)">
    <rect x="0" y="0" width="220" height="44" rx="6" fill="#f59e0b" fill-opacity="0.08" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="110" y="27" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#fbbf24" text-anchor="middle">Error Compounding</text>
  </g>

  <g transform="translate(530, 250)">
    <rect x="0" y="0" width="220" height="44" rx="6" fill="#ef4444" fill-opacity="0.08" stroke="#ef4444" stroke-width="1.5"/>
    <text x="110" y="27" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#f87171" text-anchor="middle">Blast Radius</text>
  </g>

  <!-- Scoring Scale -->
  <g transform="translate(0, 350)">
    <rect x="100" y="0" width="600" height="6" rx="3" fill="url(#scaleGrad)"/>
    
    <!-- 0.0 Safe -->
    <circle cx="100" cy="3" r="5" fill="#10b981" stroke="#09090b" stroke-width="2"/>
    <text x="100" y="25" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#10b981" text-anchor="middle">0.0</text>
    <text x="100" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#a1a1aa" text-anchor="middle">Safe</text>

    <!-- 1.0 Danger -->
    <circle cx="700" cy="3" r="5" fill="#ef4444" stroke="#09090b" stroke-width="2"/>
    <text x="700" y="25" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#ef4444" text-anchor="middle">1.0</text>
    <text x="700" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#a1a1aa" text-anchor="middle">Danger</text>

    <!-- 0.8 Landmine Threshold -->
    <line x1="580" y1="-15" x2="580" y2="0" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3,2"/>
    <circle cx="580" cy="3" r="6" fill="#09090b" stroke="#ef4444" stroke-width="1.5"/>
    <circle cx="580" cy="3" r="2.5" fill="#ef4444"/>
    <text x="580" y="-25" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#ef4444" text-anchor="middle">0.8 <tspan font-weight="500">Landmine Threshold</tspan></text>
  </g>
</svg>