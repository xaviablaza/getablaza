<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="background-color: #09090b; font-family: system-ui, -apple-system, sans-serif;">
  <defs>
    <!-- Arrowhead for main flow -->
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#52525b"/>
    </marker>
    <!-- Arrowhead for demotion protocol -->
    <marker id="arrow-red" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#ef4444"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect fill="#09090b"/>

  <!-- Title -->
  <text x="400" y="60" fill="#ffffff" font-size="16" font-weight="600" text-anchor="middle" letter-spacing="0.5">Graduated Autonomy: The Agentic Shadowing Method</text>

  <!-- ================= CONNECTING LINES ================= -->
  <!-- Gate 1 Lines -->
  <path d="M 150 200 L 183 200" stroke="#52525b" stroke-width="1.5"/>
  <path d="M 207 200 L 240 200" stroke="#52525b" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- Gate 2 Lines -->
  <path d="M 350 200 L 383 200" stroke="#52525b" stroke-width="1.5"/>
  <path d="M 407 200 L 440 200" stroke="#52525b" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- Gate 3 Lines -->
  <path d="M 550 200 L 583 200" stroke="#52525b" stroke-width="1.5"/>
  <path d="M 607 200 L 640 200" stroke="#52525b" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- Demotion Protocol Line -->
  <path d="M 705 245 L 705 302 Q 705 310 697 310 L 303 310 Q 295 310 295 302 L 295 240" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4 4" fill="none" marker-end="url(#arrow-red)"/>
  
  <!-- Demotion Protocol Label -->
  <rect x="430" y="300" width="140" height="20" fill="#09090b"/>
  <text x="500" y="314" fill="#ef4444" font-size="12" font-weight="500" text-anchor="middle">Demotion Protocol</text>

  <!-- ================= GATES ================= -->
  <!-- Gate 1 -->
  <g transform="translate(0, 0)">
    <text x="195" y="178" fill="#e4e4e7" font-size="11" font-weight="500" text-anchor="middle">Qualify</text>
    <path d="M 195 188 L 207 200 L 195 212 L 183 200 Z" fill="#18181b" stroke="#52525b" stroke-width="1.5"/>
    <path d="M 195 205 L 195 195 M 192 198 L 195 195 L 198 198" stroke="#a1a1aa" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="195" y="230" fill="#71717a" font-size="10" text-anchor="middle">Agreement &gt;= 95%</text>
  </g>

  <!-- Gate 2 -->
  <g transform="translate(0, 0)">
    <text x="395" y="178" fill="#e4e4e7" font-size="11" font-weight="500" text-anchor="middle">Qualify</text>
    <path d="M 395 188 L 407 200 L 395 212 L 383 200 Z" fill="#18181b" stroke="#52525b" stroke-width="1.5"/>
    <path d="M 395 205 L 395 195 M 392 198 L 395 195 L 398 198" stroke="#a1a1aa" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="395" y="230" fill="#71717a" font-size="10" text-anchor="middle">Agreement &gt;= 95%</text>
  </g>

  <!-- Gate 3 -->
  <g transform="translate(0, 0)">
    <text x="595" y="178" fill="#e4e4e7" font-size="11" font-weight="500" text-anchor="middle">Qualify</text>
    <path d="M 595 188 L 607 200 L 595 212 L 583 200 Z" fill="#18181b" stroke="#52525b" stroke-width="1.5"/>
    <path d="M 595 205 L 595 195 M 592 198 L 595 195 L 598 198" stroke="#a1a1aa" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="595" y="230" fill="#71717a" font-size="10" text-anchor="middle">Agreement &gt;= 95%</text>
  </g>

  <!-- ================= PHASES ================= -->
  <!-- Phase 1: Shadow Mode -->
  <g transform="translate(0, 0)">
    <rect x="40" y="160" width="110" height="80" rx="8" fill="rgba(239, 68, 68, 0.06)" stroke="#ef4444" stroke-width="1.5"/>
    <g transform="translate(83, 170)">
      <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" stroke="#ef4444" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="12" cy="12" r="3" stroke="#ef4444" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="95" y="210" fill="#ffffff" font-size="13" font-weight="600" text-anchor="middle">Shadow Mode</text>
    <text x="95" y="226" fill="#a1a1aa" font-size="11" text-anchor="middle">100% review</text>
  </g>

  <!-- Phase 2: Human-in-Loop -->
  <g transform="translate(0, 0)">
    <rect x="240" y="160" width="110" height="80" rx="8" fill="rgba(245, 158, 11, 0.06)" stroke="#f59e0b" stroke-width="1.5"/>
    <g transform="translate(283, 170)">
      <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" stroke="#f59e0b" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="9" cy="7" r="4" stroke="#f59e0b" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M16 11l2 2 4-4" stroke="#f59e0b" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="295" y="210" fill="#ffffff" font-size="13" font-weight="600" text-anchor="middle">Human-in-Loop</text>
    <text x="295" y="226" fill="#a1a1aa" font-size="11" text-anchor="middle">Selective review</text>
  </g>

  <!-- Phase 3: Spot Check -->
  <g transform="translate(0, 0)">
    <rect x="440" y="160" width="110" height="80" rx="8" fill="rgba(59, 130, 246, 0.06)" stroke="#3b82f6" stroke-width="1.5"/>
    <g transform="translate(483, 170)">
      <circle cx="11" cy="11" r="8" stroke="#3b82f6" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="m21 21-4.3-4.3" stroke="#3b82f6" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="495" y="210" fill="#ffffff" font-size="13" font-weight="600" text-anchor="middle">Spot Check</text>
    <text x="495" y="226" fill="#a1a1aa" font-size="11" text-anchor="middle">Sample-based</text>
  </g>

  <!-- Phase 4: Autonomous -->
  <g transform="translate(0, 0)">
    <rect x="640" y="155" width="130" height="90" rx="8" fill="rgba(16, 185, 129, 0.08)" stroke="#10b981" stroke-width="2"/>
    <g transform="translate(693, 168)">
      <path d="M12 3l1.912 5.813a2 2 0 0 0 1.275 1.275L21 12l-5.813 1.912a2 2 0 0 0-1.275 1.275L12 21l-1.912-5.813a2 2 0 0 0-1.275-1.275L3 12l5.813-1.912a2 2 0 0 0 1.275-1.275L12 3z" stroke="#10b981" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="705" y="212" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">Autonomous</text>
    <text x="705" y="230" fill="#a1a1aa" font-size="11" text-anchor="middle">Earned trust</text>
  </g>

</svg>