<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="background-color:#09090b; font-family:system-ui, -apple-system, sans-serif;">
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <polygon points="0 0, 8 4, 0 8" fill="#a1a1aa" />
    </marker>
    <filter id="glow-amber" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-emerald" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect fill="#09090b" />

  <!-- Title & Subtitle -->
  <text x="400" y="35" fill="#ffffff" font-size="16" font-weight="bold" text-anchor="middle" letter-spacing="0.5">The Yield Function</text>
  <text x="400" y="55" fill="#a1a1aa" font-size="12" text-anchor="middle">You're optimizing cumulative value, not quality of any single piece</text>

  <!-- Grid Lines -->
  <g stroke="#27272a" stroke-width="1" stroke-dasharray="4 4">
    <!-- Horizontal -->
    <line x1="80" y1="82" x2="550" y2="82" />
    <line x1="80" y1="146" x2="550" y2="146" />
    <line x1="80" y1="211" x2="550" y2="211" />
    <line x1="80" y1="275" x2="550" y2="275" />
    <!-- Vertical -->
    <line x1="197.5" y1="80" x2="197.5" y2="340" />
    <line x1="315" y1="80" x2="315" y2="340" />
    <line x1="432.5" y1="80" x2="432.5" y2="340" />
    <line x1="550" y1="80" x2="550" y2="340" />
  </g>

  <!-- Axes -->
  <g stroke="#52525b" stroke-width="1.5">
    <line x1="80" y1="340" x2="550" y2="340" />
    <line x1="80" y1="340" x2="80" y2="80" />
  </g>

  <!-- Axis Labels -->
  <g fill="#a1a1aa" font-size="11" text-anchor="middle">
    <!-- X Axis (Weeks) -->
    <text x="80" y="360">0</text>
    <text x="197.5" y="360">13</text>
    <text x="315" y="360">26</text>
    <text x="432.5" y="360">39</text>
    <text x="550" y="360">52</text>
    <text x="315" y="385" font-weight="bold" fill="#d4d4d8">Weeks</text>

    <!-- Y Axis (Cumulative Value) -->
    <text x="65" y="344" text-anchor="end">0</text>
    <text x="65" y="279" text-anchor="end">3k</text>
    <text x="65" y="215" text-anchor="end">6k</text>
    <text x="65" y="150" text-anchor="end">9k</text>
    <text x="65" y="86" text-anchor="end">12k</text>
  </g>
  <text x="-210" y="30" fill="#d4d4d8" font-size="11" font-weight="bold" text-anchor="middle" transform="rotate(-90)">Cumulative Value</text>

  <!-- Shaded Area (Advantage) -->
  <!-- Starts at crossover point (205.6, 317.7) -->
  <path d="M 205.6 317.7 L 300 280 L 400 200 L 550 80 L 550 240 Z" fill="#10b981" fill-opacity="0.08" />

  <!-- Curves -->
  <!-- Curve A: Perfectionist (Amber) -->
  <g>
    <!-- Glow -->
    <path d="M 80 340 L 107 340 L 550 240" fill="none" stroke="#f59e0b" stroke-width="6" opacity="0.15" />
    <!-- Main Line -->
    <path d="M 80 340 L 107 340 L 550 240" fill="none" stroke="#f59e0b" stroke-width="2.5" filter="url(#glow-amber)" />
    <!-- Ship Point -->
    <circle cx="107" cy="340" r="4" fill="#09090b" stroke="#f59e0b" stroke-width="2" />
  </g>

  <!-- Curve B: Iterator (Emerald) -->
  <g>
    <!-- Glow -->
    <path d="M 80 340 L 89 340 L 200 320 L 300 280 L 400 200 L 550 80" fill="none" stroke="#10b981" stroke-width="6" opacity="0.15" />
    <!-- Main Line -->
    <path d="M 80 340 L 89 340 L 200 320 L 300 280 L 400 200 L 550 80" fill="none" stroke="#10b981" stroke-width="2.5" filter="url(#glow-emerald)" />
    <!-- Ship Points (3 pieces) -->
    <circle cx="89" cy="340" r="4" fill="#09090b" stroke="#10b981" stroke-width="2" />
    <circle cx="200" cy="320" r="4" fill="#09090b" stroke="#10b981" stroke-width="2" />
    <circle cx="300" cy="280" r="4" fill="#09090b" stroke="#10b981" stroke-width="2" />
  </g>

  <!-- Curve Labels -->
  <text x="420" y="265" fill="#f59e0b" font-size="12" font-weight="600">1 piece at 95 quality</text>
  <text x="340" y="180" fill="#10b981" font-size="12" font-weight="600">3 pieces at 80 quality</text>

  <!-- Annotation: Iterator Wins -->
  <g>
    <text x="140" y="245" fill="#a1a1aa" font-size="12" text-anchor="middle" font-weight="500">Iterator wins here</text>
    <path d="M 140 255 Q 140 310 195 315" fill="none" stroke="#a1a1aa" stroke-width="1.5" marker-end="url(#arrowhead)" stroke-dasharray="3 3" />
  </g>

  <!-- Summary Box (Right Side) -->
  <g transform="translate(580, 120)">
    <!-- Card Background -->
    <rect width="190" height="130" rx="8" fill="#18181b" stroke="#27272a" stroke-width="1" />
    
    <!-- Perfectionist Stats -->
    <text x="15" y="25" fill="#a1a1aa" font-size="11" font-weight="500">Perfectionist:</text>
    <text x="15" y="45" fill="#f59e0b" font-size="14" font-weight="bold">4,655 <tspan font-size="11" font-weight="normal" fill="#a1a1aa">quality-weeks</tspan></text>
    
    <!-- Iterator Stats -->
    <text x="15" y="70" fill="#a1a1aa" font-size="11" font-weight="500">Iterator:</text>
    <text x="15" y="90" fill="#10b981" font-size="14" font-weight="bold">12,080 <tspan font-size="11" font-weight="normal" fill="#a1a1aa">quality-weeks</tspan></text>
    
    <!-- Divider -->
    <line x1="15" y1="105" x2="175" y2="105" stroke="#27272a" stroke-width="1" />
    
    <!-- Conclusion -->
    <text x="15" y="122" fill="#ffffff" font-size="13" font-weight="bold">2.6x more value</text>
  </g>

</svg>