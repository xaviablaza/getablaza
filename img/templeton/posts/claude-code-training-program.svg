<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <style>
      text {
        font-family: system-ui, -apple-system, sans-serif;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect fill="#09090b"/>

  <!-- Global Title & Subtitle -->
  <text x="400" y="35" fill="#ffffff" font-size="16" font-weight="600" text-anchor="middle">Tool Rollout vs. Skill Development</text>
  <text x="400" y="55" fill="#a1a1aa" font-size="12" text-anchor="middle">AI assistance is a skill, not a tool</text>

  <!-- LEFT CHART: Tool Rollout -->
  <g id="left-chart">
    <!-- Chart Title -->
    <text x="220" y="90" fill="#f59e0b" font-size="14" font-weight="600" text-anchor="middle">Tool Rollout</text>

    <!-- Axes -->
    <path d="M 80 100 L 80 360 L 360 360" stroke="#27272a" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Axis Labels -->
    <text transform="rotate(-90 40 230)" x="40" y="230" fill="#71717a" font-size="11" font-weight="500" text-anchor="middle" letter-spacing="1">PRODUCTIVITY</text>
    <text x="220" y="390" fill="#71717a" font-size="11" font-weight="500" text-anchor="middle" letter-spacing="1">TIME</text>

    <!-- 1x Baseline -->
    <path d="M 80 300 L 360 300" stroke="#3f3f46" stroke-width="1" stroke-dasharray="4 4" fill="none"/>
    <text x="70" y="304" fill="#a1a1aa" font-size="12" text-anchor="end">1x</text>

    <!-- Expected Productivity (Dashed) -->
    <path d="M 80 300 C 150 300, 200 100, 360 80" stroke="#52525b" stroke-width="2" stroke-dasharray="6 4" fill="none" stroke-linecap="round"/>
    <text x="350" y="70" fill="#71717a" font-size="12" text-anchor="end">Expected</text>

    <!-- Actual Productivity (Amber) -->
    <!-- Glow -->
    <path d="M 80 300 Q 100 260, 140 260 L 360 260" stroke="#f59e0b" stroke-width="6" stroke-opacity="0.15" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Main Line -->
    <path d="M 80 300 Q 100 260, 140 260 L 360 260" stroke="#f59e0b" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Plateau Label -->
    <text x="250" y="248" fill="#f59e0b" font-size="12" font-weight="500" text-anchor="middle">15% adoption plateau</text>
  </g>

  <!-- RIGHT CHART: Skill Development -->
  <g id="right-chart">
    <!-- Chart Title -->
    <text x="590" y="90" fill="#10b981" font-size="14" font-weight="600" text-anchor="middle">Skill Development</text>

    <!-- Axes -->
    <path d="M 450 100 L 450 360 L 730 360" stroke="#27272a" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Axis Labels -->
    <text transform="rotate(-90 410 230)" x="410" y="230" fill="#71717a" font-size="11" font-weight="500" text-anchor="middle" letter-spacing="1">PRODUCTIVITY</text>
    <text x="590" y="390" fill="#71717a" font-size="11" font-weight="500" text-anchor="middle" letter-spacing="1">TIME</text>

    <!-- 1x Baseline -->
    <path d="M 450 300 L 730 300" stroke="#3f3f46" stroke-width="1" stroke-dasharray="4 4" fill="none"/>
    <text x="440" y="304" fill="#a1a1aa" font-size="12" text-anchor="end">1x</text>

    <!-- Actual Productivity (Emerald) -->
    <!-- Glow -->
    <path d="M 450 300 Q 480 340, 510 340 C 540 340, 560 120, 640 120 L 730 120" stroke="#10b981" stroke-width="6" stroke-opacity="0.15" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Main Line -->
    <path d="M 450 300 Q 480 340, 510 340 C 540 340, 560 120, 640 120 L 730 120" stroke="#10b981" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Inflection Point -->
    <circle cx="556.25" cy="230" r="4" fill="#09090b" stroke="#10b981" stroke-width="2"/>

    <!-- Peak Label -->
    <text x="685" y="108" fill="#10b981" font-size="12" font-weight="500" text-anchor="middle">2-4x throughput</text>

    <!-- Dip Label (Learning Curve) -->
    <text x="510" y="315" fill="#71717a" font-size="12" text-anchor="middle">Learning curve</text>
    <line x1="510" y1="320" x2="510" y2="335" stroke="#71717a" stroke-width="1" stroke-dasharray="2 2"/>
  </g>
</svg>