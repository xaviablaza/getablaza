<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="sliderGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#09090b" />

  <!-- Title -->
  <text x="400" y="40" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" text-anchor="middle" letter-spacing="0.5">The Dollarized Confusion Matrix</text>

  <!-- Row and Column Headers -->
  <text x="280" y="85" fill="#a1a1aa" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" text-anchor="middle">Predicted Neg</text>
  <text x="440" y="85" fill="#a1a1aa" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" text-anchor="middle">Predicted Pos</text>
  <text x="185" y="165" fill="#a1a1aa" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" text-anchor="end">Actual Neg</text>
  <text x="185" y="285" fill="#a1a1aa" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" text-anchor="end">Actual Pos</text>

  <!-- Matrix Background & FN Highlight -->
  <rect x="200" y="100" width="320" height="240" fill="#18181b" stroke="#3f3f46" stroke-width="1.5" rx="8" />
  <path d="M 200 220 L 360 220 L 360 340 L 208 340 A 8 8 0 0 1 200 332 Z" fill="#ef4444" fill-opacity="0.12" />

  <!-- Matrix Grid Lines -->
  <line x1="360" y1="100" x2="360" y2="340" stroke="#3f3f46" stroke-width="1.5" />
  <line x1="200" y1="220" x2="520" y2="220" stroke="#3f3f46" stroke-width="1.5" />

  <!-- Top-Left Cell: True Negative (TN) -->
  <text x="212" y="122" fill="#71717a" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">TN</text>
  <text x="280" y="165" fill="#10b981" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="700" text-anchor="middle">$0</text>
  <text x="280" y="190" fill="#71717a" font-family="system-ui, -apple-system, sans-serif" font-size="13" text-anchor="middle">No cost</text>

  <!-- Top-Right Cell: False Positive (FP) -->
  <text x="372" y="122" fill="#71717a" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">FP</text>
  <text x="440" y="165" fill="#f59e0b" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="700" text-anchor="middle">$C<tspan baseline-shift="sub" font-size="16">FP</tspan></text>
  <text x="440" y="190" fill="#71717a" font-family="system-ui, -apple-system, sans-serif" font-size="13" text-anchor="middle">Unnecessary review</text>

  <!-- Bottom-Left Cell: False Negative (FN) - Visually Prominent -->
  <text x="212" y="242" fill="#ef4444" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700">FN</text>
  <text x="280" y="285" fill="#ef4444" font-family="system-ui, -apple-system, sans-serif" font-size="34" font-weight="800" text-anchor="middle" filter="url(#glow)">$C<tspan baseline-shift="sub" font-size="20">FN</tspan></text>
  <text x="280" y="315" fill="#a1a1aa" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" text-anchor="middle">Missed risk</text>

  <!-- Bottom-Right Cell: True Positive (TP) -->
  <text x="372" y="242" fill="#71717a" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">TP</text>
  <text x="440" y="285" fill="#10b981" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="700" text-anchor="middle">$0</text>
  <text x="440" y="310" fill="#71717a" font-family="system-ui, -apple-system, sans-serif" font-size="13" text-anchor="middle">Correct catch</text>

  <!-- RIGHT SIDE: Threshold Slider -->
  <!-- Slider Labels -->
  <text x="683" y="110" fill="#3b82f6" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Conservative (t low)</text>
  <text x="683" y="325" fill="#f59e0b" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" text-anchor="middle">Permissive (t high)</text>

  <!-- Slider Track -->
  <rect x="680" y="125" width="6" height="175" fill="url(#sliderGrad)" rx="3" />

  <!-- Slider Ticks -->
  <line x1="676" y1="128" x2="690" y2="128" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" />
  <line x1="676" y1="297" x2="690" y2="297" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" />

  <!-- Optimal t* Marker & Arrow -->
  <g transform="translate(0, 235)">
    <!-- Slider Thumb -->
    <rect x="676" y="-2" width="14" height="4" fill="#ffffff" rx="2" />
    <!-- Arrow -->
    <polygon points="670,0 660,-5 660,5" fill="#ffffff" />
    <line x1="660" y1="0" x2="630" y2="0" stroke="#ffffff" stroke-width="1.5" />
    <!-- Label -->
    <text x="620" y="4" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" text-anchor="end">Optimal t*</text>
  </g>

  <!-- Formula Box -->
  <rect x="583" y="345" width="200" height="36" fill="#18181b" stroke="#3f3f46" stroke-width="1" rx="6" />
  <text x="683" y="368" fill="#d4d4d8" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" text-anchor="middle">t* = C<tspan baseline-shift="sub" font-size="10">FP</tspan> / (C<tspan baseline-shift="sub" font-size="10">FP</tspan> + C<tspan baseline-shift="sub" font-size="10">FN</tspan>)</text>
</svg>