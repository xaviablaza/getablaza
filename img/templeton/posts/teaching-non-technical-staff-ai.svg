<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="font-family: system-ui, -apple-system, sans-serif;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#71717a"/>
    </marker>
    <marker id="arrow-emerald" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#10b981"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect fill="#09090b"/>

  <!-- Title -->
  <text x="400" y="35" fill="#ffffff" font-size="16" font-weight="bold" text-anchor="middle" letter-spacing="0.5">The 4-Tier AI Training System</text>

  <!-- Support Bar -->
  <rect x="40" y="280" width="710" height="40" rx="6" fill="#18181b" stroke="#71717a" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="395" y="305" fill="#a1a1aa" font-size="13" font-weight="500" text-anchor="middle">Support: Slack + Office Hours + Mentors</text>

  <!-- Feedback Loop -->
  <path d="M 690 100 L 690 75 Q 690 65 675 65 L 110 65 Q 95 65 95 80 L 95 134" fill="none" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arrow-emerald)"/>
  <text x="395" y="55" fill="#10b981" font-size="12" font-weight="bold" text-anchor="middle">Outcome Tracking</text>

  <!-- Connecting Arrows -->
  <line x1="154" y1="180" x2="176" y2="180" stroke="#71717a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="304" y1="180" x2="326" y2="180" stroke="#71717a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="454" y1="180" x2="476" y2="180" stroke="#71717a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="604" y1="180" x2="626" y2="180" stroke="#71717a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- INTAKE: Assessment -->
  <rect x="40" y="142" width="110" height="78" rx="6" fill="#18181b" stroke="#a1a1aa" stroke-width="1.5"/>
  <text x="95" y="158" fill="#a1a1aa" font-size="11" font-weight="bold" text-anchor="middle" letter-spacing="0.5">ASSESSMENT</text>
  
  <rect x="50" y="168" width="90" height="20" rx="4" fill="#27272a"/>
  <text x="95" y="182" fill="#d4d4d8" font-size="10" text-anchor="middle">Literacy Survey</text>
  
  <rect x="50" y="192" width="90" height="20" rx="4" fill="#27272a"/>
  <text x="95" y="206" fill="#d4d4d8" font-size="10" text-anchor="middle">Use Case Map</text>

  <!-- TIER 1 -->
  <rect x="180" y="130" width="120" height="100" rx="6" fill="#10b981" fill-opacity="0.1" stroke="#10b981" stroke-width="1.5"/>
  <text x="240" y="155" fill="#10b981" font-size="10" font-weight="bold" text-anchor="middle" letter-spacing="1">TIER 1</text>
  <text x="240" y="175" fill="#ffffff" font-size="14" font-weight="bold" text-anchor="middle">ChatGPT/Q&amp;A</text>
  <text x="240" y="195" fill="#a1a1aa" font-size="11" text-anchor="middle">Simplest</text>
  
  <rect x="195" y="206" width="90" height="16" rx="8" fill="#10b981" fill-opacity="0.2"/>
  <text x="240" y="217" fill="#10b981" font-size="9" font-weight="600" text-anchor="middle">70% start here</text>

  <!-- TIER 2 -->
  <rect x="330" y="120" width="120" height="120" rx="6" fill="#3b82f6" fill-opacity="0.1" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="390" y="155" fill="#3b82f6" font-size="10" font-weight="bold" text-anchor="middle" letter-spacing="1">TIER 2</text>
  <text x="390" y="175" fill="#ffffff" font-size="14" font-weight="bold" text-anchor="middle">AI Tutors</text>
  <text x="390" y="195" fill="#a1a1aa" font-size="11" text-anchor="middle">Moderate</text>

  <!-- TIER 3 -->
  <rect x="480" y="110" width="120" height="140" rx="6" fill="#6366f1" fill-opacity="0.1" stroke="#6366f1" stroke-width="1.5"/>
  <text x="540" y="155" fill="#6366f1" font-size="10" font-weight="bold" text-anchor="middle" letter-spacing="1">TIER 3</text>
  <text x="540" y="175" fill="#ffffff" font-size="14" font-weight="bold" text-anchor="middle">Domain Tools</text>
  <text x="540" y="195" fill="#a1a1aa" font-size="11" text-anchor="middle">Advanced</text>

  <!-- TIER 4 -->
  <rect x="630" y="100" width="120" height="160" rx="6" fill="#f59e0b" fill-opacity="0.1" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="690" y="155" fill="#f59e0b" font-size="10" font-weight="bold" text-anchor="middle" letter-spacing="1">TIER 4</text>
  <text x="690" y="175" fill="#ffffff" font-size="14" font-weight="bold" text-anchor="middle">Vibe Coding</text>
  <text x="690" y="195" fill="#a1a1aa" font-size="11" text-anchor="middle">Expert level</text>

  <!-- Key Stat -->
  <rect x="560" y="345" width="190" height="36" rx="18" fill="#18181b" stroke="#27272a" stroke-width="1.5"/>
  <text x="655" y="368" font-size="13" text-anchor="middle">
    <tspan fill="#ffffff" font-weight="bold">15% to 85%</tspan>
    <tspan fill="#a1a1aa"> active usage</tspan>
  </text>
</svg>