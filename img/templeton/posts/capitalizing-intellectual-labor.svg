<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="system-ui, -apple-system, sans-serif">
    <defs>
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
        </pattern>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 1 L 8 5 L 0 9 z" fill="#71717a"/>
        </marker>
    </defs>

    <!-- Background -->
    <rect fill="#09090b"/>
    <rect fill="url(#grid)"/>

    <!-- Header -->
    <text x="400" y="40" fill="#ffffff" font-size="18" font-weight="700" text-anchor="middle" letter-spacing="0.5">The 6-Step Protocol for Technology Transitions</text>
    <text x="400" y="62" fill="#a1a1aa" font-size="13" font-weight="400" text-anchor="middle">Backtested against 700 years of history</text>

    <!-- Timeline Base Line -->
    <line x1="40" y1="320" x2="760" y2="320" stroke="#3f3f46" stroke-width="2"/>

    <!-- Connecting Arrows -->
    <g id="arrows">
        <line x1="132" y1="150" x2="140" y2="150" stroke="#71717a" stroke-width="1.5" marker-end="url(#arrow)"/>
        <line x1="264" y1="150" x2="272" y2="150" stroke="#71717a" stroke-width="1.5" marker-end="url(#arrow)"/>
        <line x1="396" y1="150" x2="404" y2="150" stroke="#71717a" stroke-width="1.5" marker-end="url(#arrow)"/>
        <line x1="528" y1="150" x2="536" y2="150" stroke="#71717a" stroke-width="1.5" marker-end="url(#arrow)"/>
        <line x1="660" y1="150" x2="668" y2="150" stroke="#71717a" stroke-width="1.5" marker-end="url(#arrow)"/>
    </g>

    <!-- Step 1: DECOMPOSE -->
    <g id="step-1">
        <line x1="70" y1="213" x2="70" y2="295" stroke="#3f3f46" stroke-width="1.5" stroke-dasharray="4 4"/>
        <rect x="12" y="95" width="116" height="110" rx="12" fill="#18181b" stroke="#6366f1" stroke-width="1.5"/>
        <text x="70" y="116" fill="#6366f1" font-size="11" font-weight="700" text-anchor="middle" letter-spacing="1">01</text>
        <text x="70" y="136" fill="#6366f1" font-size="12" font-weight="800" text-anchor="middle" letter-spacing="0.5">DECOMPOSE</text>
        <text x="70" fill="#a1a1aa" font-size="11" text-anchor="middle">
            <tspan x="70" y="154">Identify the</tspan>
            <tspan x="70" y="168">friction that</tspan>
            <tspan x="70" y="182">collapsed</tspan>
        </text>
        <text x="70" y="305" fill="#6366f1" font-size="12" font-weight="700" text-anchor="middle">1300s</text>
        <circle cx="70" cy="320" r="5" fill="#09090b" stroke="#6366f1" stroke-width="2"/>
        <text x="70" y="342" fill="#d4d4d8" font-size="12" text-anchor="middle">Bookkeeping</text>
    </g>

    <!-- Step 2: INVERT -->
    <g id="step-2">
        <line x1="202" y1="213" x2="202" y2="295" stroke="#3f3f46" stroke-width="1.5" stroke-dasharray="4 4"/>
        <rect x="144" y="95" width="116" height="110" rx="12" fill="#18181b" stroke="#3b82f6" stroke-width="1.5"/>
        <text x="202" y="116" fill="#3b82f6" font-size="11" font-weight="700" text-anchor="middle" letter-spacing="1">02</text>
        <text x="202" y="136" fill="#3b82f6" font-size="12" font-weight="800" text-anchor="middle" letter-spacing="0.5">INVERT</text>
        <text x="202" fill="#a1a1aa" font-size="11" text-anchor="middle">
            <tspan x="202" y="154">Test if</tspan>
            <tspan x="202" y="168">you're NOT</tspan>
            <tspan x="202" y="182">affected</tspan>
        </text>
        <text x="202" y="305" fill="#3b82f6" font-size="12" font-weight="700" text-anchor="middle">1850s</text>
        <circle cx="202" cy="320" r="5" fill="#09090b" stroke="#3b82f6" stroke-width="2"/>
        <text x="202" y="342" fill="#d4d4d8" font-size="12" text-anchor="middle">LLC</text>
    </g>

    <!-- Step 3: COMPLEMENT -->
    <g id="step-3">
        <line x1="334" y1="213" x2="334" y2="295" stroke="#3f3f46" stroke-width="1.5" stroke-dasharray="4 4"/>
        <rect x="276" y="95" width="116" height="110" rx="12" fill="#18181b" stroke="#10b981" stroke-width="1.5"/>
        <text x="334" y="116" fill="#10b981" font-size="11" font-weight="700" text-anchor="middle" letter-spacing="1">03</text>
        <text x="334" y="136" fill="#10b981" font-size="12" font-weight="800" text-anchor="middle" letter-spacing="0.5">COMPLEMENT</text>
        <text x="334" fill="#a1a1aa" font-size="11" text-anchor="middle">
            <tspan x="334" y="161">Find the</tspan>
            <tspan x="334" y="175">new scarcity</tspan>
        </text>
        <text x="334" y="305" fill="#10b981" font-size="12" font-weight="700" text-anchor="middle">1910s</text>
        <circle cx="334" cy="320" r="5" fill="#09090b" stroke="#10b981" stroke-width="2"/>
        <text x="334" y="342" fill="#d4d4d8" font-size="12" text-anchor="middle">Assembly</text>
    </g>

    <!-- Step 4: MIGRATE -->
    <g id="step-4">
        <line x1="466" y1="213" x2="466" y2="295" stroke="#3f3f46" stroke-width="1.5" stroke-dasharray="4 4"/>
        <rect x="408" y="95" width="116" height="110" rx="12" fill="#18181b" stroke="#f59e0b" stroke-width="1.5"/>
        <text x="466" y="116" fill="#f59e0b" font-size="11" font-weight="700" text-anchor="middle" letter-spacing="1">04</text>
        <text x="466" y="136" fill="#f59e0b" font-size="12" font-weight="800" text-anchor="middle" letter-spacing="0.5">MIGRATE</text>
        <text x="466" fill="#a1a1aa" font-size="11" text-anchor="middle">
            <tspan x="466" y="161">Map where</tspan>
            <tspan x="466" y="175">value moves</tspan>
        </text>
        <text x="466" y="305" fill="#f59e0b" font-size="12" font-weight="700" text-anchor="middle">1960s</text>
        <circle cx="466" cy="320" r="5" fill="#09090b" stroke="#f59e0b" stroke-width="2"/>
        <text x="466" y="342" fill="#d4d4d8" font-size="12" text-anchor="middle">Container</text>
    </g>

    <!-- Step 5: RECALCULATE -->
    <g id="step-5">
        <line x1="598" y1="213" x2="598" y2="295" stroke="#3f3f46" stroke-width="1.5" stroke-dasharray="4 4"/>
        <rect x="540" y="95" width="116" height="110" rx="12" fill="#18181b" stroke="#ef4444" stroke-width="1.5"/>
        <text x="598" y="116" fill="#ef4444" font-size="11" font-weight="700" text-anchor="middle" letter-spacing="1">05</text>
        <text x="598" y="136" fill="#ef4444" font-size="12" font-weight="800" text-anchor="middle" letter-spacing="0.5">RECALCULATE</text>
        <text x="598" fill="#a1a1aa" font-size="11" text-anchor="middle">
            <tspan x="598" y="161">Update the</tspan>
            <tspan x="598" y="175">Kelly fraction</tspan>
        </text>
        <text x="598" y="305" fill="#ef4444" font-size="12" font-weight="700" text-anchor="middle">1990s</text>
        <circle cx="598" cy="320" r="5" fill="#09090b" stroke="#ef4444" stroke-width="2"/>
        <text x="598" y="342" fill="#d4d4d8" font-size="12" text-anchor="middle">Internet</text>
    </g>

    <!-- Step 6: TIME -->
    <g id="step-6">
        <line x1="730" y1="213" x2="730" y2="295" stroke="#3f3f46" stroke-width="1.5" stroke-dasharray="4 4"/>
        <rect x="672" y="95" width="116" height="110" rx="12" fill="#18181b" stroke="#ffffff" stroke-width="1.5"/>
        <text x="730" y="116" fill="#ffffff" font-size="11" font-weight="700" text-anchor="middle" letter-spacing="1">06</text>
        <text x="730" y="136" fill="#ffffff" font-size="12" font-weight="800" text-anchor="middle" letter-spacing="0.5">TIME</text>
        <text x="730" fill="#a1a1aa" font-size="11" text-anchor="middle">
            <tspan x="730" y="154">How long is</tspan>
            <tspan x="730" y="168">the adoption</tspan>
            <tspan x="730" y="182">gap?</tspan>
        </text>
        
        <!-- Highlighted LLM Timeline Dot -->
        <text x="730" y="305" fill="#ffffff" font-size="13" font-weight="800" text-anchor="middle">2022</text>
        <circle cx="730" cy="320" r="16" fill="#ffffff" opacity="0.1"/>
        <circle cx="730" cy="320" r="10" fill="#ffffff" opacity="0.2"/>
        <circle cx="730" cy="320" r="6.5" fill="#09090b" stroke="#ffffff" stroke-width="2.5"/>
        <text x="730" y="342" fill="#ffffff" font-size="13" font-weight="700" text-anchor="middle">LLMs</text>
    </g>
</svg>