<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <!-- Arrowhead for Red Arrow -->
    <marker id="arrow-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444" />
    </marker>
    
    <!-- Arrowhead for Emerald Arrow -->
    <marker id="arrow-emerald" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981" />
    </marker>

    <!-- Arrowhead for Blue Arrow -->
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6" />
    </marker>
  </defs>

  <!-- Background -->
  <rect fill="#09090b" />

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#ffffff" font-size="16px" font-weight="600" letter-spacing="0.5px">One-Shot vs. Iterated Negotiations</text>

  <!-- LEFT SIDE: One-Shot Game -->
  <g>
    <!-- Box -->
    <rect x="40" y="60" width="340" height="280" rx="8" fill="#ef4444" fill-opacity="0.06" stroke="#ef4444" stroke-width="1.5" />
    
    <!-- Section Title -->
    <text x="210" y="90" text-anchor="middle" fill="#ef4444" font-size="14px" font-weight="600">One-Shot Game</text>

    <!-- Matrix Labels -->
    <text x="210" y="115" text-anchor="middle" fill="#a1a1aa" font-size="11px" font-weight="600" letter-spacing="1px">THEM</text>
    <text x="-170" y="115" transform="rotate(-90)" text-anchor="middle" fill="#a1a1aa" font-size="11px" font-weight="600" letter-spacing="1px">YOU</text>
    
    <text x="175" y="126" text-anchor="middle" fill="#71717a" font-size="10px">Cooperate</text>
    <text x="245" y="126" text-anchor="middle" fill="#71717a" font-size="10px">Defect</text>
    
    <text x="132" y="153" text-anchor="end" fill="#71717a" font-size="10px">Cooperate</text>
    <text x="132" y="193" text-anchor="end" fill="#71717a" font-size="10px">Defect</text>

    <!-- Highlighted Cell (Defect / Cooperate) -->
    <rect x="140" y="170" width="70" height="40" fill="#ef4444" fill-opacity="0.15" />

    <!-- Matrix Grid -->
    <rect x="140" y="130" width="140" height="80" fill="none" stroke="#3f3f46" stroke-width="1.5" />
    <line x1="210" y1="130" x2="210" y2="210" stroke="#3f3f46" stroke-width="1.5" />
    <line x1="140" y1="170" x2="280" y2="170" stroke="#3f3f46" stroke-width="1.5" />

    <!-- Payoffs -->
    <text x="175" y="151" text-anchor="middle" dominant-baseline="middle" fill="#a1a1aa" font-size="12px">3, 3</text>
    <text x="245" y="151" text-anchor="middle" dominant-baseline="middle" fill="#a1a1aa" font-size="12px">0, 5</text>
    <text x="175" y="191" text-anchor="middle" dominant-baseline="middle" fill="#ef4444" font-size="12px" font-weight="700">5, 0</text>
    <text x="245" y="191" text-anchor="middle" dominant-baseline="middle" fill="#a1a1aa" font-size="12px">1, 1</text>

    <!-- Optimize Text -->
    <text x="210" y="240" text-anchor="middle" fill="#ef4444" font-size="13px" font-weight="500">Optimize this round</text>

    <!-- Outcome Arrow -->
    <path d="M 210 255 L 210 285" stroke="#ef4444" stroke-width="1.5" marker-end="url(#arrow-red)" />

    <!-- Outcome Text -->
    <text x="210" y="315" text-anchor="middle" fill="#ef4444" font-size="14px" font-weight="700">-$20K over 18 months</text>
  </g>

  <!-- RIGHT SIDE: Iterated Game -->
  <g>
    <!-- Box -->
    <rect x="420" y="60" width="340" height="280" rx="8" fill="#10b981" fill-opacity="0.06" stroke="#10b981" stroke-width="1.5" />
    
    <!-- Section Title -->
    <text x="590" y="90" text-anchor="middle" fill="#10b981" font-size="14px" font-weight="600">Iterated Game</text>

    <!-- Matrix Labels -->
    <text x="590" y="115" text-anchor="middle" fill="#a1a1aa" font-size="11px" font-weight="600" letter-spacing="1px">THEM</text>
    <text x="-170" y="495" transform="rotate(-90)" text-anchor="middle" fill="#a1a1aa" font-size="11px" font-weight="600" letter-spacing="1px">YOU</text>
    
    <text x="555" y="126" text-anchor="middle" fill="#71717a" font-size="10px">Cooperate</text>
    <text x="625" y="126" text-anchor="middle" fill="#71717a" font-size="10px">Defect</text>
    
    <text x="512" y="153" text-anchor="end" fill="#71717a" font-size="10px">Cooperate</text>
    <text x="512" y="193" text-anchor="end" fill="#71717a" font-size="10px">Defect</text>

    <!-- Highlighted Cell (Cooperate / Cooperate) -->
    <rect x="520" y="130" width="70" height="40" fill="#10b981" fill-opacity="0.15" />

    <!-- Matrix Grid -->
    <rect x="520" y="130" width="140" height="80" fill="none" stroke="#3f3f46" stroke-width="1.5" />
    <line x1="590" y1="130" x2="590" y2="210" stroke="#3f3f46" stroke-width="1.5" />
    <line x1="520" y1="170" x2="660" y2="170" stroke="#3f3f46" stroke-width="1.5" />

    <!-- Payoffs -->
    <text x="555" y="151" text-anchor="middle" dominant-baseline="middle" fill="#10b981" font-size="12px" font-weight="700">3, 3</text>
    <text x="625" y="151" text-anchor="middle" dominant-baseline="middle" fill="#a1a1aa" font-size="12px">0, 5</text>
    <text x="555" y="191" text-anchor="middle" dominant-baseline="middle" fill="#a1a1aa" font-size="12px">5, 0</text>
    <text x="625" y="191" text-anchor="middle" dominant-baseline="middle" fill="#a1a1aa" font-size="12px">1, 1</text>

    <!-- Game Has Memory Graphic -->
    <path d="M 665 190 C 715 190, 715 140, 675 140" fill="none" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)" stroke-dasharray="3 3" />
    <text x="705" y="161" text-anchor="middle" fill="#3b82f6" font-size="10px" font-weight="500">Game has</text>
    <text x="705" y="173" text-anchor="middle" fill="#3b82f6" font-size="10px" font-weight="500">memory</text>

    <!-- Optimize Text -->
    <text x="590" y="240" text-anchor="middle" fill="#10b981" font-size="13px" font-weight="500">Optimize the relationship</text>

    <!-- Outcome Arrow -->
    <path d="M 590 255 L 590 285" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow-emerald)" />

    <!-- Outcome Text -->
    <text x="590" y="315" text-anchor="middle" fill="#10b981" font-size="14px" font-weight="700">+$47K over 3 years</text>
  </g>

  <!-- CENTER: Divider -->
  <g>
    <line x1="400" y1="60" x2="400" y2="340" stroke="#71717a" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.5" />
    <circle cx="400" cy="200" r="14" fill="#09090b" stroke="#71717a" stroke-width="1.5" />
    <text x="400" y="204" text-anchor="middle" fill="#71717a" font-size="12px" font-weight="600">vs</text>
  </g>

  <!-- Bottom Annotation -->
  <text x="400" y="380" text-anchor="middle" fill="#a1a1aa" font-size="12px" font-style="italic">"A rejected offer in an iterated game is information, not failure"</text>

</svg>