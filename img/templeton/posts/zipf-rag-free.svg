<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#09090b"/>
      <stop offset="100%" stop-color="#121214"/>
    </linearGradient>
    
    <linearGradient id="area-gradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect fill="url(#bg-gradient)"/>

  <!-- Title -->
  <text x="400" y="35" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" text-anchor="middle" letter-spacing="0.5">The Vocabulary Fingerprint</text>

  <!-- Grid Lines -->
  <path d="M 80 145 L 550 145 M 80 210 L 550 210 M 80 275 L 550 275" stroke="#27272a" stroke-width="1" stroke-dasharray="4 4"/>
  <path d="M 197 80 L 197 340 M 315 80 L 315 340 M 432 80 L 432 340" stroke="#27272a" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Axes -->
  <path d="M 80 80 L 80 340 L 550 340" stroke="#52525b" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Axis Labels -->
  <text x="315" y="380" fill="#a1a1aa" font-family="system-ui, -apple-system, sans-serif" font-size="13" text-anchor="middle">Term Rank (by frequency)</text>
  <text x="40" y="210" fill="#a1a1aa" font-family="system-ui, -apple-system, sans-serif" font-size="13" text-anchor="middle" transform="rotate(-90 40 210)">Frequency</text>

  <!-- Legend -->
  <line x1="380" y1="90" x2="410" y2="90" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
  <text x="420" y="94" fill="#e4e4e7" font-family="system-ui, -apple-system, sans-serif" font-size="12">Your Corpus</text>
  <line x1="380" y1="110" x2="410" y2="110" stroke="#52525b" stroke-width="2" stroke-dasharray="4 3" stroke-linecap="round"/>
  <text x="420" y="114" fill="#a1a1aa" font-family="system-ui, -apple-system, sans-serif" font-size="12">English Baseline</text>

  <!-- Curves -->
  <!-- Baseline Curve -->
  <path d="M 90 140 C 120 145, 140 280, 420 315" stroke="#52525b" stroke-width="2" stroke-dasharray="6 4" fill="none" stroke-linecap="round"/>
  
  <!-- Corpus Area Fill -->
  <path d="M 90 80 C 140 85, 150 325, 530 335 L 530 340 L 90 340 Z" fill="url(#area-gradient)"/>
  
  <!-- Corpus Curve (Glow) -->
  <path d="M 90 80 C 140 85, 150 325, 530 335" stroke="#10b981" stroke-width="2" fill="none" filter="url(#glow)" opacity="0.6" stroke-linecap="round"/>
  
  <!-- Corpus Curve (Solid) -->
  <path d="M 90 80 C 140 85, 150 325, 530 335" stroke="#10b981" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Annotations -->
  <!-- Signature Terms -->
  <line x1="160" y1="65" x2="124" y2="84" stroke="#10b981" stroke-width="1" stroke-dasharray="2 2" opacity="0.7"/>
  <circle cx="120" cy="86" r="3" fill="#10b981"/>
  <text x="165" y="60" fill="#10b981" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="13">Signature Terms</text>
  <text x="165" y="76" fill="#10b981" font-family="system-ui, -apple-system, sans-serif" font-size="11" opacity="0.8">typescript 6,100x</text>

  <!-- Unremarkable -->
  <line x1="235" y1="185" x2="164" y2="198" stroke="#71717a" stroke-width="1" stroke-dasharray="2 2" opacity="0.7"/>
  <circle cx="160" cy="199" r="3" fill="#71717a"/>
  <text x="240" y="180" fill="#71717a" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="13">Unremarkable</text>

  <!-- Vocabulary Holes -->
  <line x1="320" y1="265" x2="283" y2="318" stroke="#f59e0b" stroke-width="1" stroke-dasharray="2 2" opacity="0.7"/>
  <circle cx="280" cy="323" r="3" fill="#f59e0b"/>
  <text x="325" y="260" fill="#f59e0b" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="13">Vocabulary Holes</text>
  <text x="325" y="276" fill="#f59e0b" font-family="system-ui, -apple-system, sans-serif" font-size="11" opacity="0.8">missing domain concepts</text>

  <!-- Invented -->
  <line x1="460" y1="285" x2="478" y2="328" stroke="#6366f1" stroke-width="1" stroke-dasharray="2 2" opacity="0.7"/>
  <circle cx="480" cy="333" r="3" fill="#6366f1"/>
  <text x="445" y="275" fill="#6366f1" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="13">Invented</text>
  <text x="445" y="291" fill="#6366f1" font-family="system-ui, -apple-system, sans-serif" font-size="11" opacity="0.8">monotonic ratchet</text>

  <!-- Right Side Panel: Derivative Indicator -->
  <rect x="580" y="100" width="190" height="200" rx="12" fill="#18181b" stroke="#27272a" stroke-width="1"/>
  
  <!-- Upward Arrow (Learning) -->
  <g transform="translate(0, -5)">
    <path d="M 605 155 L 615 140 L 625 155" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 615 140 L 615 170" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
    <text x="640" y="150" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">Learning</text>
    <text x="640" y="168" fill="#10b981" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700">+974% ctx</text>
  </g>

  <!-- Downward Arrow (Decay) -->
  <g transform="translate(0, 5)">
    <path d="M 605 205 L 615 220 L 625 205" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 615 190 L 615 220" fill="none" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
    <text x="640" y="200" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600">Decay</text>
    <text x="640" y="218" fill="#ef4444" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700">-78% visualizing</text>
  </g>

  <!-- Caption -->
  <text x="675" y="260" fill="#a1a1aa" font-family="system-ui, -apple-system, sans-serif" font-size="12" text-anchor="middle">The derivative reveals</text>
  <text x="675" y="278" fill="#a1a1aa" font-family="system-ui, -apple-system, sans-serif" font-size="12" text-anchor="middle">knowledge flow</text>
</svg>