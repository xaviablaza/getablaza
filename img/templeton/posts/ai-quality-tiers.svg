<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect fill="#09090b" />

  <!-- Header -->
  <text x="400" y="35" fill="#ffffff" font-size="16" font-weight="600" text-anchor="middle">The Four Quality Tiers</text>
  <text x="400" y="55" fill="#a1a1aa" font-size="12" text-anchor="middle">Match accuracy requirements to error cost, not task complexity</text>

  <!-- TIER 1: Invisible Errors -->
  <g>
    <text x="115" y="225" fill="#10b981" font-size="12" font-weight="700" letter-spacing="1.5" text-anchor="middle">TIER 1</text>
    <rect x="40" y="240" width="150" height="60" rx="6" fill="#10b981" fill-opacity="0.1" stroke="#10b981" stroke-width="1.5" />
    <text x="115" y="265" fill="#ffffff" font-size="14" font-weight="600" text-anchor="middle">Invisible Errors</text>
    <text x="115" y="285" fill="#10b981" font-size="12" font-weight="500" text-anchor="middle">70%+ Accuracy</text>
    <text x="115" y="325" fill="#71717a" font-size="12" text-anchor="middle">e.g., internal tags</text>
  </g>

  <!-- TIER 2: Correctable Errors -->
  <g>
    <text x="305" y="175" fill="#3b82f6" font-size="12" font-weight="700" letter-spacing="1.5" text-anchor="middle">TIER 2</text>
    <rect x="230" y="190" width="150" height="110" rx="6" fill="#3b82f6" fill-opacity="0.15" stroke="#3b82f6" stroke-width="1.5" />
    <text x="305" y="215" fill="#ffffff" font-size="14" font-weight="600" text-anchor="middle">Correctable Errors</text>
    <text x="305" y="235" fill="#3b82f6" font-size="12" font-weight="500" text-anchor="middle">85%+ Accuracy</text>
    <text x="305" y="325" fill="#71717a" font-size="12" text-anchor="middle">e.g., draft review</text>
  </g>

  <!-- TIER 3: Visible Errors -->
  <g>
    <text x="495" y="125" fill="#f59e0b" font-size="12" font-weight="700" letter-spacing="1.5" text-anchor="middle">TIER 3</text>
    <rect x="420" y="140" width="150" height="160" rx="6" fill="#f59e0b" fill-opacity="0.2" stroke="#f59e0b" stroke-width="1.5" />
    <text x="495" y="165" fill="#ffffff" font-size="14" font-weight="600" text-anchor="middle">Visible Errors</text>
    <text x="495" y="185" fill="#f59e0b" font-size="12" font-weight="500" text-anchor="middle">95%+ Accuracy</text>
    <text x="495" y="325" fill="#71717a" font-size="12" text-anchor="middle">e.g., customer-facing</text>
  </g>

  <!-- TIER 4: Irreversible Errors -->
  <g>
    <text x="685" y="75" fill="#ef4444" font-size="12" font-weight="700" letter-spacing="1.5" text-anchor="middle">TIER 4</text>
    <rect x="610" y="90" width="150" height="210" rx="6" fill="#ef4444" fill-opacity="0.25" stroke="#ef4444" stroke-width="1.5" />
    <text x="685" y="115" fill="#ffffff" font-size="14" font-weight="600" text-anchor="middle">Irreversible Errors</text>
    <text x="685" y="135" fill="#ef4444" font-size="12" font-weight="500" text-anchor="middle">99%+ Accuracy</text>
    <text x="685" y="325" fill="#71717a" font-size="12" text-anchor="middle">e.g., fraud/compliance</text>
  </g>

  <!-- X-Axis -->
  <g>
    <line x1="40" y1="350" x2="760" y2="350" stroke="#52525b" stroke-width="1.5" />
    <!-- Axis Anchor Points -->
    <circle cx="115" cy="350" r="3" fill="#52525b" />
    <circle cx="305" cy="350" r="3" fill="#52525b" />
    <circle cx="495" cy="350" r="3" fill="#52525b" />
    <circle cx="685" cy="350" r="3" fill="#52525b" />
    <!-- Axis Label -->
    <text x="400" y="378" fill="#a1a1aa" font-size="13" font-weight="500" text-anchor="middle">Cost of Being Wrong &#x2192;</text>
  </g>
</svg>