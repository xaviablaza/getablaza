<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <!-- Standard Arrowhead -->
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#52525b" />
    </marker>
    
    <!-- Feedback Arrowhead -->
    <marker id="arrow-feedback" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#71717a" />
    </marker>

    <!-- Checkmark Icon -->
    <g id="check">
      <path d="M0 4 L4 8 L10 0" fill="none" stroke="#10b981" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </defs>

  <!-- Background -->
  <rect fill="#09090b" />

  <!-- Header -->
  <text x="400" y="40" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" text-anchor="middle">The Three Components</text>
  <text x="400" y="60" fill="#a1a1aa" font-family="system-ui, -apple-system, sans-serif" font-size="12" text-anchor="middle">Making 'good enough' explicit, measurable, and actionable</text>

  <!-- Box 1: Threshold Definition -->
  <g transform="translate(40, 120)">
    <rect width="200" height="140" rx="8" fill="#10b981" fill-opacity="0.08" stroke="#10b981" stroke-width="1.5" />
    <text x="100" y="25" fill="#10b981" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" text-anchor="middle">Threshold Definition</text>
    <line x1="0" y1="35" x2="200" y2="35" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.3" />
    
    <!-- Attributes -->
    <use href="#check" x="15" y="56" />
    <text x="35" y="64" fill="#e4e4e7" font-family="system-ui, -apple-system, sans-serif" font-size="12">Observable</text>
    
    <use href="#check" x="15" y="81" />
    <text x="35" y="89" fill="#e4e4e7" font-family="system-ui, -apple-system, sans-serif" font-size="12">Binary/bounded</text>
    
    <use href="#check" x="15" y="106" />
    <text x="35" y="114" fill="#e4e4e7" font-family="system-ui, -apple-system, sans-serif" font-size="12">Independent</text>
  </g>

  <!-- Arrow 1 to 2 -->
  <line x1="248" y1="190" x2="292" y2="190" stroke="#52525b" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- Box 2: Evaluation Protocol -->
  <g transform="translate(300, 120)">
    <rect width="200" height="140" rx="8" fill="#3b82f6" fill-opacity="0.08" stroke="#3b82f6" stroke-width="1.5" />
    <text x="100" y="25" fill="#3b82f6" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" text-anchor="middle">Evaluation Protocol</text>
    <line x1="0" y1="35" x2="200" y2="35" stroke="#3b82f6" stroke-width="1.5" stroke-opacity="0.3" />
    
    <!-- Questions -->
    <circle cx="20" cy="60" r="2.5" fill="#3b82f6" fill-opacity="0.6" />
    <text x="35" y="64" fill="#d4d4d8" font-family="system-ui, -apple-system, sans-serif" font-size="12">Who evaluates?</text>
    
    <circle cx="20" cy="85" r="2.5" fill="#3b82f6" fill-opacity="0.6" />
    <text x="35" y="89" fill="#d4d4d8" font-family="system-ui, -apple-system, sans-serif" font-size="12">Against what?</text>
    
    <circle cx="20" cy="110" r="2.5" fill="#3b82f6" fill-opacity="0.6" />
    <text x="35" y="114" fill="#d4d4d8" font-family="system-ui, -apple-system, sans-serif" font-size="12">How fast?</text>
  </g>

  <!-- Arrow 2 to 3 -->
  <line x1="508" y1="190" x2="552" y2="190" stroke="#52525b" stroke-width="1.5" marker-end="url(#arrow)" />

  <!-- Box 3: Decision Rule -->
  <g transform="translate(560, 120)">
    <rect width="200" height="140" rx="8" fill="#6366f1" fill-opacity="0.08" stroke="#6366f1" stroke-width="1.5" />
    <text x="100" y="25" fill="#6366f1" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" text-anchor="middle">Decision Rule</text>
    <line x1="0" y1="35" x2="200" y2="35" stroke="#6366f1" stroke-width="1.5" stroke-opacity="0.3" />
    
    <!-- Logic -->
    <text x="15" y="74" fill="#e4e4e7" font-family="system-ui, -apple-system, sans-serif" font-size="12">
      Score ≥ threshold <tspan fill="#52525b">→</tspan> <tspan fill="#10b981" font-weight="600">Ship</tspan>
    </text>
    
    <text x="15" y="104" fill="#e4e4e7" font-family="system-ui, -apple-system, sans-serif" font-size="12">
      Score &lt; threshold <tspan fill="#52525b">→</tspan> <tspan fill="#f59e0b" font-weight="600">Improve</tspan>
    </text>
  </g>

  <!-- Feedback Loop -->
  <g>
    <path d="M 660 268 L 660 322 Q 660 330 652 330 L 148 330 Q 140 330 140 322 L 140 268" fill="none" stroke="#71717a" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arrow-feedback)" />
    <text x="400" y="350" fill="#71717a" font-family="system-ui, -apple-system, sans-serif" font-size="12" text-anchor="middle">Update thresholds based on outcomes</text>
  </g>
</svg>