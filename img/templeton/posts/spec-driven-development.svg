<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <style>
      text {
        font-family: system-ui, -apple-system, sans-serif;
      }
    </style>
    
    <!-- Arrowhead Markers -->
    <marker id="arrow-right" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 1 1 L 7 4 L 1 7 Z" fill="#a1a1aa" />
    </marker>
    <marker id="arrow-left" viewBox="0 0 8 8" refX="1" refY="4" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 7 1 L 1 4 L 7 7 Z" fill="#a1a1aa" />
    </marker>
  </defs>

  <!-- Background -->
  <rect fill="#09090b" />

  <!-- Header -->
  <g text-anchor="middle">
    <text x="400" y="40" fill="#ffffff" font-size="16" font-weight="600">The Proof Chain</text>
    <text x="400" y="60" fill="#a1a1aa" font-size="12">Requirements, test plans, tests, code - every link verifiable</text>
  </g>

  <!-- Proof Chain Section -->
  <g>
    <!-- Arrows & Labels -->
    <!-- 1-2: Completeness -->
    <line x1="168" y1="145" x2="232" y2="145" stroke="#a1a1aa" stroke-width="1.5" marker-start="url(#arrow-left)" marker-end="url(#arrow-right)" />
    <text x="200" y="132" fill="#d4d4d8" font-size="12" text-anchor="middle">Completeness</text>

    <!-- 2-3: Fidelity -->
    <line x1="368" y1="145" x2="432" y2="145" stroke="#a1a1aa" stroke-width="1.5" marker-start="url(#arrow-left)" marker-end="url(#arrow-right)" />
    <text x="400" y="132" fill="#d4d4d8" font-size="12" text-anchor="middle">Fidelity</text>

    <!-- 3-4: Correctness -->
    <line x1="568" y1="145" x2="632" y2="145" stroke="#a1a1aa" stroke-width="1.5" marker-start="url(#arrow-left)" marker-end="url(#arrow-right)" />
    <text x="600" y="132" fill="#d4d4d8" font-size="12" text-anchor="middle">Correctness</text>

    <!-- Artifact Boxes -->
    <!-- Box 1: Requirements -->
    <rect x="40" y="120" width="120" height="50" rx="6" stroke="#6366f1" stroke-width="1.5" fill="#6366f1" fill-opacity="0.08" />
    <text x="100" y="145" fill="#e0e7ff" font-size="14" font-weight="500" text-anchor="middle" dominant-baseline="middle">Requirements</text>

    <!-- Box 2: Test Plans -->
    <rect x="240" y="120" width="120" height="50" rx="6" stroke="#3b82f6" stroke-width="1.5" fill="#3b82f6" fill-opacity="0.08" />
    <text x="300" y="145" fill="#dbeafe" font-size="14" font-weight="500" text-anchor="middle" dominant-baseline="middle">Test Plans</text>

    <!-- Box 3: Tests -->
    <rect x="440" y="120" width="120" height="50" rx="6" stroke="#10b981" stroke-width="1.5" fill="#10b981" fill-opacity="0.08" />
    <text x="500" y="145" fill="#d1fae5" font-size="14" font-weight="500" text-anchor="middle" dominant-baseline="middle">Tests</text>

    <!-- Box 4: Code -->
    <rect x="640" y="120" width="120" height="50" rx="6" stroke="#f59e0b" stroke-width="1.5" fill="#f59e0b" fill-opacity="0.08" />
    <text x="700" y="145" fill="#fef3c7" font-size="14" font-weight="500" text-anchor="middle" dominant-baseline="middle">Code</text>
  </g>

  <!-- Completeness Tier Spectrum Section -->
  <g>
    <!-- Section Title -->
    <text x="40" y="235" fill="#71717a" font-size="11" font-weight="600" letter-spacing="0.1em">COMPLETENESS TIER SPECTRUM</text>

    <!-- Spectrum Bars -->
    <!-- T0-T1: Explicit -->
    <rect x="40" y="260" width="240" height="40" rx="4" stroke="#10b981" stroke-width="1.5" fill="#10b981" fill-opacity="0.3" />
    <line x1="160" y1="260" x2="160" y2="300" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.5" />
    
    <!-- T2-T3: Implicit -->
    <rect x="280" y="260" width="240" height="40" rx="4" stroke="#3b82f6" stroke-width="1.5" fill="#3b82f6" fill-opacity="0.2" />
    <line x1="400" y1="260" x2="400" y2="300" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.5" />

    <!-- T4: Internet baseline -->
    <rect x="520" y="260" width="120" height="40" rx="4" stroke="#f59e0b" stroke-width="1.5" fill="#f59e0b" fill-opacity="0.1" />

    <!-- T5: Adjacent possible -->
    <rect x="640" y="260" width="120" height="40" rx="4" stroke="#ef4444" stroke-width="1.5" fill="#ef4444" fill-opacity="0.05" />

    <!-- Tier Labels (T0 - T5) -->
    <g fill="#ffffff" font-size="14" font-weight="600" text-anchor="middle" dominant-baseline="middle" opacity="0.9">
      <text x="100" y="280">T0</text>
      <text x="220" y="280">T1</text>
      <text x="340" y="280">T2</text>
      <text x="460" y="280">T3</text>
      <text x="580" y="280">T4</text>
      <text x="700" y="280">T5</text>
    </g>

    <!-- Category Pointers -->
    <line x1="160" y1="300" x2="160" y2="310" stroke="#10b981" stroke-width="1.5" opacity="0.7" />
    <line x1="400" y1="300" x2="400" y2="310" stroke="#3b82f6" stroke-width="1.5" opacity="0.7" />
    <line x1="580" y1="300" x2="580" y2="310" stroke="#f59e0b" stroke-width="1.5" opacity="0.7" />
    <line x1="700" y1="300" x2="700" y2="310" stroke="#ef4444" stroke-width="1.5" opacity="0.7" />

    <!-- Category Labels -->
    <g font-size="12" font-weight="500" text-anchor="middle" dominant-baseline="middle">
      <text x="160" y="325" fill="#10b981">Explicit</text>
      <text x="400" y="325" fill="#3b82f6">Implicit</text>
      <text x="580" y="325" fill="#f59e0b">Internet baseline</text>
      <text x="700" y="325" fill="#ef4444">Adjacent possible</text>
    </g>
  </g>
</svg>