<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect fill="#09090b"/>
  
  <g font-family="system-ui, -apple-system, sans-serif">
    <!-- Header -->
    <text x="400" y="35" fill="#ffffff" font-size="16" font-weight="600" text-anchor="middle">TaskVector: 9 Dimensions of AI Pilot Risk</text>
    <text x="400" y="55" fill="#a1a1aa" font-size="11" text-anchor="middle">Score each 0.0 (good) to 1.0 (bad). Any single dimension above 0.8 is a landmine.</text>

    <!-- Scale Markers & Lines -->
    <g stroke="#27272a" stroke-width="1.5" stroke-dasharray="4 4">
      <line x1="190" y1="80" x2="190" y2="340"/>
      <line x1="316" y1="80" x2="316" y2="340"/>
      <line x1="388" y1="80" x2="388" y2="340"/>
      <line x1="460" y1="80" x2="460" y2="340"/>
      <line x1="550" y1="80" x2="550" y2="340"/>
    </g>

    <g fill="#a1a1aa" font-size="10" text-anchor="middle">
      <text x="190" y="70">0.0</text>
      <text x="316" y="70">0.35</text>
      <text x="388" y="70">0.55</text>
      <text x="460" y="70">0.75</text>
      <text x="550" y="70">1.0</text>
    </g>

    <!-- Bar Background Tracks -->
    <g fill="#27272a" opacity="0.4">
      <rect x="190" y="94" width="360" height="12" rx="2"/>
      <rect x="190" y="122" width="360" height="12" rx="2"/>
      <rect x="190" y="150" width="360" height="12" rx="2"/>
      <rect x="190" y="178" width="360" height="12" rx="2"/>
      <rect x="190" y="206" width="360" height="12" rx="2"/>
      <rect x="190" y="234" width="360" height="12" rx="2"/>
      <rect x="190" y="262" width="360" height="12" rx="2"/>
      <rect x="190" y="290" width="360" height="12" rx="2"/>
      <rect x="190" y="318" width="360" height="12" rx="2"/>
    </g>

    <!-- Left Side: Labels -->
    <g fill="#e4e4e7" font-size="12" text-anchor="end">
      <text x="175" y="104">Input Predictability</text>
      <text x="175" y="132">Feedback Speed</text>
      <text x="175" y="160">Task Complexity</text>
      <text x="175" y="188">Check vs Do</text>
      <text x="175" y="216">Decomposability</text>
      <text x="175" y="244">Info Completeness</text>
      <text x="175" y="272">Failure Consequences</text>
      <text x="175" y="300">Modality Requirements</text>
      <text x="175" y="328">Model Capability Fit</text>
    </g>

    <!-- Left Side: Colored Bars -->
    <rect x="190" y="94" width="72" height="12" fill="#10b981" rx="2"/>
    <rect x="190" y="122" width="54" height="12" fill="#10b981" rx="2"/>
    <rect x="190" y="150" width="108" height="12" fill="#10b981" rx="2"/>
    <rect x="190" y="178" width="90" height="12" fill="#10b981" rx="2"/>
    <rect x="190" y="206" width="72" height="12" fill="#10b981" rx="2"/>
    <rect x="190" y="234" width="36" height="12" fill="#10b981" rx="2"/>
    <rect x="190" y="262" width="126" height="12" fill="#3b82f6" rx="2"/>
    <rect x="190" y="290" width="108" height="12" fill="#10b981" rx="2"/>
    <rect x="190" y="318" width="54" height="12" fill="#10b981" rx="2"/>

    <!-- Left Side: Score Values -->
    <g font-size="10" font-weight="600">
      <text x="268" y="103" fill="#10b981">0.20</text>
      <text x="250" y="131" fill="#10b981">0.15</text>
      <text x="304" y="159" fill="#10b981">0.30</text>
      <text x="286" y="187" fill="#10b981">0.25</text>
      <text x="268" y="215" fill="#10b981">0.20</text>
      <text x="232" y="243" fill="#10b981">0.10</text>
      <text x="322" y="271" fill="#3b82f6">0.35</text>
      <text x="304" y="299" fill="#10b981">0.30</text>
      <text x="250" y="327" fill="#10b981">0.15</text>
    </g>

    <!-- Right Side: Legend Panel -->
    <rect x="590" y="80" width="170" height="264" fill="#18181b" rx="8" stroke="#27272a" stroke-width="1"/>
    
    <!-- Legend Color Blocks -->
    <rect x="606" y="94" width="12" height="80.5" fill="#10b981" rx="2"/>
    <rect x="606" y="176.5" width="12" height="46" fill="#3b82f6" rx="2"/>
    <rect x="606" y="224.5" width="12" height="46" fill="#f59e0b" rx="2"/>
    <rect x="606" y="272.5" width="12" height="57.5" fill="#ef4444" rx="2"/>

    <!-- Legend Text -->
    <g text-anchor="start">
      <!-- Strong candidate -->
      <text x="628" y="132" fill="#e4e4e7" font-size="12" font-weight="500">Strong candidate</text>
      <text x="628" y="146" fill="#a1a1aa" font-size="10">Score: 0.0 - 0.35</text>

      <!-- Moderate -->
      <text x="628" y="197" fill="#e4e4e7" font-size="12" font-weight="500">Moderate</text>
      <text x="628" y="211" fill="#a1a1aa" font-size="10">Score: 0.36 - 0.55</text>

      <!-- Challenging -->
      <text x="628" y="245" fill="#e4e4e7" font-size="12" font-weight="500">Challenging</text>
      <text x="628" y="259" fill="#a1a1aa" font-size="10">Score: 0.56 - 0.75</text>

      <!-- Poor candidate -->
      <text x="628" y="299" fill="#e4e4e7" font-size="12" font-weight="500">Poor candidate</text>
      <text x="628" y="313" fill="#a1a1aa" font-size="10">Score: 0.76 - 1.0</text>
    </g>
  </g>
</svg>