    <line x1="370.00" y1="340" x2="370.00" y2="345" stroke="#3f3f46" />
    <text x="370.00" y="360">15</text>
    
    <line x1="473.33" y1="340" x2="473.33" y2="345" stroke="#3f3f46" />
    <text x="473.33" y="360">20</text>
    
    <line x1="576.67" y1="340" x2="576.67" y2="345" stroke="#3f3f46" />
    <text x="576.67" y="360">25</text>
    
    <line x1="680.00" y1="340" x2="680.00" y2="345" stroke="#3f3f46" />
    <text x="680.00" y="360">30</text>
