    </g>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#09090b" />

  <!-- Area under the curve -->
  <path d="M 80.67 340 
           L 80.67 295.00 L 101.33 256.75 L 122.00 224.24 L 142.67 196.60 
           L 163.33 173.11 L 184.00 153.14 L 204.67 136.17 L 225.33 121.75 
           L 246.00 109.49 L 266.67 99.06 L 287.33 90.20 L 308.00 82.67 
