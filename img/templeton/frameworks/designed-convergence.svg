           L 266.67 99.06 L 287.33 90.20 L 308.00 82.67 L 328.67 76.27 
           L 349.33 70.83 L 370.00 66.21 L 390.67 62.28 L 411.33 58.93 
           L 432.00 56.09 L 452.67 53.68 L 473.33 51.63 L 494.00 49.88 
           L 514.67 48.40 L 535.33 47.14 L 556.00 46.07 L 576.67 45.16 
           L 597.33 44.39 L 618.00 43.73 L 638.67 43.17 L 659.33 42.69 
           L 680.00 42.29" 
        fill="none" stroke="#8b5cf6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Scattered X marks (failed experiments) -->
  <use href="#x-mark" x="75" y="330" opacity="0.4" />
  <use href="#x-mark" x="95" y="315" opacity="0.4" />
  <use href="#x-mark" x="110" y="328" opacity="0.4" />
  <use href="#x-mark" x="130" y="312" opacity="0.4" />
  <use href="#x-mark" x="145" y="325" opacity="0.4" />
  <use href="#x-mark" x="165" y="318" opacity="0.4" />
  <use href="#x-mark" x="185" y="332" opacity="0.4" />
  <use href="#x-mark" x="205" y="315" opacity="0.4" />

  <!-- Check mark (successful experiment) -->
  <use href="#check-mark" x="235" y="140" />
  <text x="250" y="144" fill="#10b981" font-family="system-ui" font-size="12">one success is enough</text>

  <!-- Data Points & Labels -->
  <g fill="#09090b" stroke="#8b5cf6" stroke-width="2">
    <circle cx="80.67" cy="295.00" r="4" />
    <circle cx="163.33" cy="173.11" r="4" />
    <circle cx="266.67" cy="99.06" r="4" />
    <circle cx="473.33" cy="51.63" r="4" />
    <circle cx="680.00" cy="42.29" r="4" />
  </g>

  <g fill="#d4d4d8" font-family="monospace" font-size="10" text-anchor="middle">
    <text x="80.67" y="283">0.15</text>
    <text x="163.33" y="161">0.56</text>
    <text x="266.67" y="87">0.80</text>
    <text x="473.33" y="39">0.96</text>
    <text x="680.00" y="30">0.99</text>
