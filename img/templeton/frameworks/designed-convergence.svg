    <line x1="80.67" y1="340" x2="80.67" y2="345" stroke="#3f3f46" />
    <text x="80.67" y="360">1</text>
    
    <line x1="163.33" y1="340" x2="163.33" y2="345" stroke="#3f3f46" />
    <text x="163.33" y="360">5</text>
    
    <line x1="266.67" y1="340" x2="266.67" y2="345" stroke="#3f3f46" />
