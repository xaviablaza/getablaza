  <text x="680" y="288" fill="#8b5cf6" font-family="system-ui" font-size="12" opacity="0.8" text-anchor="end">single experiment: p = 0.15</text>

  <!-- Axes -->
  <line x1="60" y1="340" x2="680" y2="340" stroke="#3f3f46" stroke-width="1.5" />
  <line x1="60" y1="340" x2="60" y2="40" stroke="#3f3f46" stroke-width="1.5" />

  <!-- Axis Labels -->
  <text x="680" y="380" fill="#a1a1aa" font-family="system-ui" font-size="12" text-anchor="end">Number of experiments (n)</text>
  <text x="60" y="25" fill="#a1a1aa" font-family="system-ui" font-size="12" text-anchor="start">P(program success)</text>

  <!-- Y-axis Ticks & Labels -->
  <g fill="#a1a1aa" font-family="monospace" font-size="11" text-anchor="end">
    <text x="50" y="344">0</text>
    
    <line x1="55" y1="265" x2="60" y2="265" stroke="#3f3f46" />
    <text x="50" y="269">0.25</text>
    
    <line x1="55" y1="190" x2="60" y2="190" stroke="#3f3f46" />
    <text x="50" y="194">0.50</text>
    
    <line x1="55" y1="115" x2="60" y2="115" stroke="#3f3f46" />
    <text x="50" y="119">0.75</text>
    
    <line x1="55" y1="40" x2="60" y2="40" stroke="#3f3f46" />
