<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <marker id="arrow-indigo" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 8 5 L 0 9 z" fill="#6366f1" />
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 8 5 L 0 9 z" fill="#f59e0b" />
    </marker>
  </defs>

  <rect width="800" height="400" fill="#09090b" />

  <g font-family="system-ui, -apple-system, sans-serif">
    <!-- Top Element -->
    <rect x="300" y="20" width="200" height="40" rx="8" fill="none" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4 4" />
    <text x="400" y="45" fill="#ffffff" font-size="13" text-anchor="middle">Operator U* (latent)</text>

    <!-- Connections Top to Middle -->
    <line x1="400" y1="60" x2="160" y2="150" stroke="#6366f1" stroke-width="1" stroke-dasharray="4 4" />
    <line x1="400" y1="60" x2="400" y2="150" stroke="#6366f1" stroke-width="1" stroke-dasharray="4 4" />
    <line x1="400" y1="60" x2="640" y2="150" stroke="#6366f1" stroke-width="1" stroke-dasharray="4 4" />

    <!-- Middle Row -->
    <!-- Left Box -->
    <rect x="95" y="150" width="130" height="70" rx="6" fill="#6366f1" fill-opacity="0.05" stroke="#6366f1" stroke-width="1" />
    <text x="160" y="168" fill="#ffffff" font-size="13" text-anchor="middle">Revealed Preference</text>
    <text x="160" y="186" fill="#71717a" font-size="11" text-anchor="middle">"scripture"</text>
    <text x="160" y="204" fill="#52525b" font-size="11" text-anchor="middle">Cost: 0 / Info: low</text>

    <!-- Center Box -->
    <rect x="335" y="150" width="130" height="70" rx="6" fill="#6366f1" fill-opacity="0.05" stroke="#6366f1" stroke-width="1" />
    <text x="400" y="168" fill="#ffffff" font-size="13" text-anchor="middle">Structured Elicitation</text>
    <text x="400" y="186" fill="#71717a" font-size="11" text-anchor="middle">"sacrament"</text>
    <text x="400" y="204" fill="#52525b" font-size="11" text-anchor="middle">Cost: med / Info: high</text>

    <!-- Right Box -->
    <rect x="575" y="150" width="130" height="70" rx="6" fill="#6366f1" fill-opacity="0.05" stroke="#6366f1" stroke-width="1" />
    <text x="640" y="168" fill="#ffffff" font-size="13" text-anchor="middle">Direct Query</text>
    <text x="640" y="186" fill="#71717a" font-size="11" text-anchor="middle">"prayer"</text>
    <text x="640" y="204" fill="#52525b" font-size="11" text-anchor="middle">Cost: high / Info: med</text>

    <!-- Connections Middle to Bottom -->
    <line x1="160" y1="220" x2="330" y2="285" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow-indigo)" />
    <line x1="400" y1="220" x2="400" y2="285" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow-indigo)" />
    <line x1="640" y1="220" x2="470" y2="285" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow-indigo)" />

    <!-- Bottom Element -->
    <rect x="300" y="285" width="200" height="50" rx="8" fill="none" stroke="#818cf8" stroke-width="2" />
    <text x="400" y="315" fill="#ffffff" font-size="13" text-anchor="middle">Agent belief P(U*)</text>

    <!-- Right Side Elements -->
    <polygon points="680,298 692,310 680,322 668,310" fill="none" stroke="#f59e0b" stroke-width="1.5" />
    <text x="700" y="314" fill="#f59e0b" font-size="13" text-anchor="start">Drift Detection</text>

    <!-- Amber Arrows -->
    <path d="M 500 310 Q 584 280 664 308" fill="none" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow-amber)" />
    <path d="M 680 296 C 680 230, 750 185, 709 185" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arrow-amber)" />
  </g>
</svg>