<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350">
  <rect width="800" height="350" fill="#09090b"/>
  <defs>
    <marker id="af" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#10b981"/>
    </marker>
    <marker id="ab" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 1 L 10 5 L 0 9 z" fill="#ef4444"/>
    </marker>
  </defs>
  <g font-family="system-ui, sans-serif">
    <!-- State circles -->
    <circle cx="150" cy="175" r="50" fill="#450a0a" stroke="#ef4444" stroke-width="2"/>
    <circle cx="400" cy="175" r="50" fill="#451a03" stroke="#f59e0b" stroke-width="2"/>
    <circle cx="650" cy="175" r="50" fill="#022c22" stroke="#10b981" stroke-width="2"/>
    <!-- State labels -->
    <text x="150" y="180" fill="#fff" font-size="14" font-weight="500" text-anchor="middle">Disabled</text>
    <text x="400" y="180" fill="#fff" font-size="14" font-weight="500" text-anchor="middle">HITL</text>
    <text x="650" y="180" fill="#fff" font-size="14" font-weight="500" text-anchor="middle">Autonomous</text>
    <!-- Forward arrows (promotion - above) -->
    <path d="M 185 135 Q 275 55 365 135" fill="none" stroke="#10b981" stroke-width="2" marker-end="url(#af)"/>
    <path d="M 435 135 Q 525 55 615 135" fill="none" stroke="#10b981" stroke-width="2" marker-end="url(#af)"/>
    <!-- Backward arrows (rollback - below) -->
    <path d="M 615 215 Q 525 295 435 215" fill="none" stroke="#ef4444" stroke-width="2" marker-end="url(#ab)"/>
    <path d="M 365 215 Q 275 295 185 215" fill="none" stroke="#ef4444" stroke-width="2" marker-end="url(#ab)"/>
    <!-- Forward labels -->
    <text x="275" y="72" fill="#10b981" font-size="12" font-weight="500" text-anchor="middle">smoke tests pass</text>
    <text x="525" y="60" fill="#10b981" font-size="12" font-weight="500" text-anchor="middle">error &#60; 2%</text>
    <text x="525" y="76" fill="#10b981" font-size="11" text-anchor="middle">for N consecutive batches</text>
    <!-- Backward labels -->
    <text x="525" y="298" fill="#ef4444" font-size="12" font-weight="500" text-anchor="middle">error &#62; 5% or drift</text>
    <text x="275" y="298" fill="#ef4444" font-size="12" font-weight="500" text-anchor="middle">critical failure</text>
    <!-- Hysteresis annotation -->
    <line x1="720" y1="120" x2="720" y2="230" stroke="#71717a" stroke-width="1" stroke-dasharray="3 3"/>
    <line x1="715" y1="145" x2="725" y2="145" stroke="#71717a" stroke-width="1"/>
    <line x1="715" y1="205" x2="725" y2="205" stroke="#71717a" stroke-width="1"/>
    <text x="735" y="168" fill="#71717a" font-size="10" font-weight="500">2% promote</text>
    <text x="735" y="182" fill="#71717a" font-size="10" font-weight="500">5% rollback</text>
    <text x="735" y="200" fill="#52525b" font-size="10" font-style="italic">hysteresis gap</text>
  </g>
</svg>
