<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 380" font-family="JetBrains Mono, monospace">
  <style>
    @keyframes pulseI {
      0%, 100% { stroke-width: 5; filter: drop-shadow(0 0 2px #3b82f6); }
      50% { stroke-width: 6; filter: drop-shadow(0 0 8px #3b82f6); }
    }
    @keyframes pulseJ {
      0%, 100% { stroke-width: 5; filter: drop-shadow(0 0 2px #f59e0b); }
      50% { stroke-width: 6; filter: drop-shadow(0 0 8px #f59e0b); }
    }
    @keyframes drawVector {
      from { stroke-dashoffset: 300; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .unit-i { animation: pulseI 2s ease-in-out infinite; }
    .unit-j { animation: pulseJ 2s ease-in-out infinite; animation-delay: 0.5s; }
    .component-3i { stroke-dasharray: 300; animation: drawVector 0.8s ease-out forwards; animation-delay: 0.3s; stroke-dashoffset: 300; }
    .component-2j { stroke-dasharray: 300; animation: drawVector 0.8s ease-out forwards; animation-delay: 0.6s; stroke-dashoffset: 300; }
    .resultant { stroke-dasharray: 300; animation: drawVector 1s ease-out forwards; animation-delay: 1s; stroke-dashoffset: 300; }
    .label { animation: fadeIn 0.5s ease-out forwards; opacity: 0; }
    .label-i { animation-delay: 0.2s; }
    .label-j { animation-delay: 0.4s; }
    .label-3i { animation-delay: 0.8s; }
    .label-2j { animation-delay: 1.1s; }
    .label-v { animation-delay: 1.4s; }
  </style>

  <!-- Background -->
  <rect width="550" height="380" fill="#000"/>

  <!-- Title -->
  <text x="275" y="30" font-size="16" font-weight="600" fill="#4ade80" text-anchor="middle">Unit Vectors: The Standard Basis</text>

  <!-- Arrows -->
  <defs>
    <marker id="iArrow" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8, 2 4" fill="#3b82f6"/>
    </marker>
    <marker id="jArrow" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8, 2 4" fill="#f59e0b"/>
    </marker>
    <marker id="vArrow" markerWidth="14" markerHeight="10" refX="12" refY="5" orient="auto">
      <polygon points="0 0, 14 5, 0 10, 2 5" fill="#22c55e"/>
    </marker>
  </defs>

  <!-- LEFT SIDE: Unit vectors definition -->
  <g transform="translate(0, 20)">
    <!-- Coordinate system -->
    <line x1="60" y1="220" x2="200" y2="220" stroke="#525252" stroke-width="1"/>
    <line x1="60" y1="220" x2="60" y2="100" stroke="#525252" stroke-width="1"/>

    <!-- Unit circle reference (dotted) -->
    <circle cx="60" cy="220" r="50" fill="none" stroke="#1f2937" stroke-width="1" stroke-dasharray="4,4"/>

    <!-- i unit vector (pointing right, length = 1 unit = 50px) -->
    <line class="unit-i" x1="60" y1="220" x2="108" y2="220" stroke="#3b82f6" stroke-width="5" marker-end="url(#iArrow)"/>
    <text class="label label-i" x="75" y="245" font-size="14" fill="#3b82f6" font-weight="bold">î = (1, 0)</text>

    <!-- j unit vector (pointing up) -->
    <line class="unit-j" x1="60" y1="220" x2="60" y2="172" stroke="#f59e0b" stroke-width="5" marker-end="url(#jArrow)"/>
    <text class="label label-j" x="15" y="195" font-size="14" fill="#f59e0b" font-weight="bold">ĵ = (0, 1)</text>

    <!-- Labels -->
    <text x="60" y="85" font-size="11" fill="#86efac" text-anchor="middle">Unit vectors have</text>
    <text x="60" y="98" font-size="11" fill="#86efac" text-anchor="middle">length = 1</text>
  </g>

  <!-- RIGHT SIDE: Decomposition example -->
  <g transform="translate(200, 20)">
    <!-- Coordinate system -->
    <line x1="80" y1="220" x2="300" y2="220" stroke="#525252" stroke-width="1"/>
    <line x1="80" y1="220" x2="80" y2="80" stroke="#525252" stroke-width="1"/>

    <!-- Grid hints -->
    <g stroke="#1a3a1a" stroke-width="0.5" stroke-dasharray="2,4">
      <line x1="130" y1="220" x2="130" y2="80"/>
      <line x1="180" y1="220" x2="180" y2="80"/>
      <line x1="230" y1="220" x2="230" y2="80"/>
      <line x1="80" y1="170" x2="300" y2="170"/>
      <line x1="80" y1="120" x2="300" y2="120"/>
    </g>

    <!-- 3i component (horizontal, dashed) -->
    <line class="component-3i" x1="80" y1="220" x2="230" y2="220" stroke="#3b82f6" stroke-width="3" stroke-dasharray="8,4"/>
    <text class="label label-3i" x="155" y="240" font-size="13" fill="#3b82f6" font-weight="bold">3î</text>

    <!-- 2j component (vertical, dashed) -->
    <line class="component-2j" x1="230" y1="220" x2="230" y2="120" stroke="#f59e0b" stroke-width="3" stroke-dasharray="8,4"/>
    <text class="label label-2j" x="245" y="175" font-size="13" fill="#f59e0b" font-weight="bold">2ĵ</text>

    <!-- Resultant vector -->
    <line class="resultant" x1="80" y1="220" x2="222" y2="120" stroke="#22c55e" stroke-width="4" marker-end="url(#vArrow)"/>
    <text class="label label-v" x="130" y="155" font-size="15" fill="#22c55e" font-weight="bold">v = (3, 2)</text>

    <text x="190" y="85" font-size="11" fill="#86efac" text-anchor="middle">v = 3î + 2ĵ</text>
  </g>

  <!-- Formula box -->
  <rect x="50" y="305" width="450" height="65" fill="#052e05" rx="4"/>
  <text x="275" y="325" font-size="12" fill="#86efac" text-anchor="middle">
    Any 2D vector can be written as a combination of î and ĵ:
  </text>
  <text x="275" y="348" font-size="15" fill="#4ade80" text-anchor="middle" font-weight="bold">
    v = (x, y) = x·î + y·ĵ
  </text>
  <text x="275" y="365" font-size="11" fill="#86efac" text-anchor="middle">
    Example: (3, 2) = 3î + 2ĵ = 3(1,0) + 2(0,1)
  </text>
</svg>
