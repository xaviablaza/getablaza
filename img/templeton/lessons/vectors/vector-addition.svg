<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 380" font-family="JetBrains Mono, monospace">
  <style>
    @keyframes drawVector {
      from { stroke-dashoffset: 300; }
      to { stroke-dashoffset: 0; }
    }
    @keyframes pulseGreen {
      0%, 100% { stroke-width: 4; filter: drop-shadow(0 0 3px #22c55e); }
      50% { stroke-width: 5; filter: drop-shadow(0 0 10px #22c55e); }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { r: 5; }
      50% { r: 7; }
    }
    .vec-a { stroke-dasharray: 300; animation: drawVector 0.8s ease-out forwards; }
    .vec-b { stroke-dasharray: 300; animation: drawVector 0.8s ease-out forwards; animation-delay: 0.5s; stroke-dashoffset: 300; }
    .vec-sum { stroke-dasharray: 300; animation: drawVector 1s ease-out forwards, pulseGreen 2s ease-in-out infinite; animation-delay: 1s; stroke-dashoffset: 300; }
    .connection-point { animation: pulse 1.5s ease-in-out infinite; }
    .label { animation: fadeIn 0.4s ease-out forwards; opacity: 0; }
    .label-a { animation-delay: 0.3s; }
    .label-b { animation-delay: 0.8s; }
    .label-sum { animation-delay: 1.3s; }
    .label-connect { animation-delay: 1.5s; }
  </style>

  <!-- Background -->
  <rect width="550" height="380" fill="#000"/>

  <!-- Title -->
  <text x="275" y="30" font-size="16" font-weight="600" fill="#4ade80" text-anchor="middle">Vector Addition: Head-to-Tail Method</text>

  <!-- Arrows with larger heads -->
  <defs>
    <marker id="aArrow" markerWidth="14" markerHeight="10" refX="12" refY="5" orient="auto">
      <polygon points="0 0, 14 5, 0 10, 2 5" fill="#3b82f6"/>
    </marker>
    <marker id="bArrow" markerWidth="14" markerHeight="10" refX="12" refY="5" orient="auto">
      <polygon points="0 0, 14 5, 0 10, 2 5" fill="#f59e0b"/>
    </marker>
    <marker id="sumArrow" markerWidth="16" markerHeight="12" refX="14" refY="6" orient="auto">
      <polygon points="0 0, 16 6, 0 12, 3 6" fill="#22c55e"/>
    </marker>
  </defs>

  <!-- Subtle grid -->
  <g stroke="#1a3a1a" stroke-width="0.5" opacity="0.5">
    <line x1="80" y1="250" x2="480" y2="250"/>
    <line x1="80" y1="180" x2="480" y2="180"/>
    <line x1="80" y1="110" x2="480" y2="110"/>
    <line x1="80" y1="60" x2="80" y2="280"/>
    <line x1="180" y1="60" x2="180" y2="280"/>
    <line x1="280" y1="60" x2="280" y2="280"/>
    <line x1="380" y1="60" x2="380" y2="280"/>
  </g>

  <!-- Origin dot -->
  <circle cx="80" cy="250" r="6" fill="#22c55e"/>
  <text x="60" y="270" font-size="11" fill="#525252" font-weight="bold">origin</text>

  <!-- Vector a (blue) - 3 right, 1.4 up (scaled) -->
  <line class="vec-a" x1="80" y1="250" x2="220" y2="180" stroke="#3b82f6" stroke-width="4" marker-end="url(#aArrow)"/>
  <text class="label label-a" x="120" y="195" font-size="14" fill="#3b82f6" font-weight="bold">a = (3, 1.4)</text>

  <!-- Vector b (orange) - starts at head of a -->
  <line class="vec-b" x1="230" y1="180" x2="370" y2="100" stroke="#f59e0b" stroke-width="4" marker-end="url(#bArrow)"/>
  <text class="label label-b" x="320" y="125" font-size="14" fill="#f59e0b" font-weight="bold">b = (3, 1.6)</text>

  <!-- Sum vector (green) - origin to final head -->
  <line class="vec-sum" x1="80" y1="250" x2="370" y2="100" stroke="#22c55e" stroke-width="4" marker-end="url(#sumArrow)"/>
  <text class="label label-sum" x="200" y="200" font-size="15" fill="#22c55e" font-weight="bold">a + b = (6, 3)</text>

  <!-- Connection point (head of a = tail of b) -->
  <circle class="connection-point" cx="230" cy="180" r="5" fill="#a855f7"/>
  <text class="label label-connect" x="245" y="200" font-size="11" fill="#a855f7" font-weight="bold">head of a = tail of b</text>

  <!-- Final head -->
  <circle cx="380" cy="100" r="5" fill="#22c55e"/>

  <!-- Step-by-step guide -->
  <rect x="400" y="150" width="140" height="90" fill="#0a0a0a" stroke="#1f2937" rx="4"/>
  <text x="410" y="170" font-size="10" fill="#86efac" font-weight="bold">Steps:</text>
  <text x="410" y="188" font-size="9" fill="#3b82f6">1. Draw vector a</text>
  <text x="410" y="204" font-size="9" fill="#f59e0b">2. Place b's tail at a's head</text>
  <text x="410" y="220" font-size="9" fill="#22c55e">3. Draw sum: origin to b's head</text>

  <!-- Formula box -->
  <rect x="50" y="300" width="450" height="70" fill="#052e05" rx="4"/>
  <text x="275" y="320" font-size="12" fill="#86efac" text-anchor="middle">
    Add component by component:
  </text>
  <text x="275" y="342" font-size="15" fill="#4ade80" text-anchor="middle" font-weight="bold">
    (3, 1.4) + (3, 1.6) = (3+3, 1.4+1.6) = (6, 3)
  </text>
  <text x="275" y="362" font-size="10" fill="#86efac" text-anchor="middle">
    This works for any number of vectors!
  </text>
</svg>
