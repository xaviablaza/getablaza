<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" font-family="JetBrains Mono, monospace">
  <style>
    @keyframes pulseVector {
      0%, 100% { stroke-width: 4; }
      50% { stroke-width: 5; }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes glowArrow {
      0%, 100% { filter: drop-shadow(0 0 2px #22c55e); }
      50% { filter: drop-shadow(0 0 6px #22c55e); }
    }
    .vector-line { animation: pulseVector 2s ease-in-out infinite, glowArrow 2s ease-in-out infinite; }
    .label { animation: fadeIn 0.5s ease-out forwards; }
    .label-tail { animation-delay: 0.2s; opacity: 0; }
    .label-head { animation-delay: 0.4s; opacity: 0; }
    .label-mag { animation-delay: 0.6s; opacity: 0; }
    .label-dir { animation-delay: 0.8s; opacity: 0; }
  </style>

  <!-- Background -->
  <rect width="500" height="300" fill="#000"/>

  <!-- Title -->
  <text x="250" y="30" font-size="16" font-weight="600" fill="#4ade80" text-anchor="middle">A Vector is an Arrow</text>

  <!-- Grid (subtle) -->
  <g stroke="#1a3a1a" stroke-width="0.5">
    <line x1="50" y1="80" x2="50" y2="250"/>
    <line x1="100" y1="80" x2="100" y2="250"/>
    <line x1="150" y1="80" x2="150" y2="250"/>
    <line x1="200" y1="80" x2="200" y2="250"/>
    <line x1="250" y1="80" x2="250" y2="250"/>
    <line x1="300" y1="80" x2="300" y2="250"/>
    <line x1="350" y1="80" x2="350" y2="250"/>
    <line x1="400" y1="80" x2="400" y2="250"/>
    <line x1="450" y1="80" x2="450" y2="250"/>
    <line x1="50" y1="100" x2="450" y2="100"/>
    <line x1="50" y1="150" x2="450" y2="150"/>
    <line x1="50" y1="200" x2="450" y2="200"/>
    <line x1="50" y1="250" x2="450" y2="250"/>
  </g>

  <!-- Vector arrow with larger arrowhead -->
  <defs>
    <marker id="arrowhead" markerWidth="14" markerHeight="10" refX="12" refY="5" orient="auto">
      <polygon points="0 0, 14 5, 0 10, 2 5" fill="#22c55e"/>
    </marker>
  </defs>

  <line class="vector-line" x1="100" y1="200" x2="340" y2="100" stroke="#22c55e" stroke-width="4" marker-end="url(#arrowhead)"/>

  <!-- Tail point -->
  <circle cx="100" cy="200" r="6" fill="#22c55e"/>
  <text class="label label-tail" x="70" y="225" font-size="13" fill="#86efac" font-weight="bold">tail</text>

  <!-- Head label -->
  <text class="label label-head" x="355" y="95" font-size="13" fill="#86efac" font-weight="bold">head</text>

  <!-- Magnitude label (along vector) -->
  <text class="label label-mag" x="190" y="125" font-size="15" fill="#4ade80" font-weight="bold" transform="rotate(-22, 190, 125)">magnitude (length)</text>

  <!-- Direction indicator (arc) -->
  <path d="M 140 200 A 50 50 0 0 0 158 168" fill="none" stroke="#fbbf24" stroke-width="3"/>
  <polygon points="158,168 150,175 162,178" fill="#fbbf24"/>
  <text class="label label-dir" x="165" y="195" font-size="13" fill="#fbbf24" font-weight="bold">direction</text>

  <!-- Key insight box -->
  <rect x="50" y="258" width="400" height="32" fill="#052e05" rx="4"/>
  <text x="250" y="280" font-size="12" fill="#86efac" text-anchor="middle">
    Same length + same direction = same vector (regardless of position)
  </text>
</svg>
