<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" style="background-color: #09090b; font-family: system-ui, -apple-system, sans-serif;">
  <defs>
    <linearGradient id="timelineGrad" gradientUnits="userSpaceOnUse" x1="150" y1="340" x2="650" y2="340">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect fill="#09090b"/>

  <!-- Title -->
  <text x="400" y="40" fill="#ffffff" font-size="16" font-weight="600" text-anchor="middle" letter-spacing="0.5">Three Kinds of Magic</text>

  <!-- Column 1: Physics Magic -->
  <rect x="40" y="70" width="220" height="230" rx="8" stroke="#6366f1" stroke-width="1.5" fill="#6366f1" fill-opacity="0.06"/>
  <svg x="134" y="90" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
  </svg>
  <text x="150" y="145" fill="#6366f1" font-size="16" font-weight="600" text-anchor="middle">Physics Magic</text>
  <text x="150" y="165" fill="#71717a" font-size="13" text-anchor="middle">Violates causal mechanics</text>
  <line x1="80" y1="185" x2="220" y2="185" stroke="#27272a" stroke-width="1"/>
  <text x="150" y="215" fill="#a1a1aa" font-size="14" text-anchor="middle">Telegraph</text>
  <text x="150" y="245" fill="#a1a1aa" font-size="14" text-anchor="middle">Steam engine</text>
  <text x="150" y="275" fill="#a1a1aa" font-size="14" text-anchor="middle">Atomic bomb</text>

  <!-- Column 2: Representation Magic -->
  <rect x="290" y="70" width="220" height="230" rx="8" stroke="#3b82f6" stroke-width="1.5" fill="#3b82f6" fill-opacity="0.06"/>
  <svg x="384" y="90" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path>
    <circle cx="12" cy="12" r="3"></circle>
  </svg>
  <text x="400" y="145" fill="#3b82f6" font-size="16" font-weight="600" text-anchor="middle">Representation Magic</text>
  <text x="400" y="165" fill="#71717a" font-size="13" text-anchor="middle">Violates epistemology</text>
  <line x1="330" y1="185" x2="470" y2="185" stroke="#27272a" stroke-width="1"/>
  <text x="400" y="215" fill="#a1a1aa" font-size="14" text-anchor="middle">Photography</text>
  <text x="400" y="245" fill="#a1a1aa" font-size="14" text-anchor="middle">Film</text>
  <text x="400" y="275" fill="#a1a1aa" font-size="14" text-anchor="middle">Audio recording</text>

  <!-- Column 3: Agency Magic (Prominent) -->
  <rect x="540" y="70" width="220" height="230" rx="8" stroke="#10b981" stroke-width="2" fill="#10b981" fill-opacity="0.1"/>
  <svg x="634" y="90" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"></path>
    <path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z"></path>
    <path d="M15 13a4.5 4.5 0 0 1-3-4 4.5 4.5 0 0 1-3 4"></path>
    <path d="M17.599 6.5a3 3 0 0 0 .399-1.375"></path>
    <path d="M6.002 5.125A3 3 0 0 0 6.401 6.5"></path>
    <path d="M3.477 10.896a4 4 0 0 1 .585-.396"></path>
    <path d="M19.938 10.5a4 4 0 0 1 .585.396"></path>
    <path d="M6 18a4 4 0 0 1-1.967-.516"></path>
    <path d="M19.967 17.484A4 4 0 0 1 18 18"></path>
  </svg>
  <text x="650" y="145" fill="#10b981" font-size="16" font-weight="600" text-anchor="middle">Agency Magic</text>
  <text x="650" y="165" fill="#71717a" font-size="13" text-anchor="middle">Violates social cognition</text>
  <line x1="580" y1="185" x2="720" y2="185" stroke="#27272a" stroke-width="1"/>
  <text x="650" y="215" fill="#a1a1aa" font-size="14" text-anchor="middle">Robots</text>
  <text x="650" y="245" fill="#a1a1aa" font-size="14" text-anchor="middle">Deepfakes</text>
  <text x="650" y="275" fill="#ffffff" font-size="14" font-weight="bold" text-anchor="middle">LLMs</text>

  <!-- Timeline Element -->
  <line x1="150" y1="300" x2="150" y2="334" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.5"/>
  <line x1="400" y1="300" x2="400" y2="334" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.5"/>
  <line x1="650" y1="300" x2="650" y2="334" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.8"/>

  <line x1="40" y1="340" x2="750" y2="340" stroke="url(#timelineGrad)" stroke-width="2"/>
  <polygon points="750,335 760,340 750,345" fill="#10b981"/>

  <circle cx="150" cy="340" r="5" fill="#09090b" stroke="#6366f1" stroke-width="2"/>
  <circle cx="400" cy="340" r="5" fill="#09090b" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="650" cy="340" r="6" fill="#10b981" stroke="#10b981" stroke-width="2" filter="url(#glow)"/>

  <!-- Bottom Text -->
  <text x="400" y="375" fill="#10b981" font-size="13" font-style="italic" text-anchor="middle">LLMs are the strongest agency magic humanity has encountered</text>
</svg>