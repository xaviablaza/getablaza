<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <title>Friction Collapse and Scarcity Mapping</title>
  <desc>A mapping diagram showing how historical friction collapses reveal new underlying economic scarcities, culminating in AI and selection.</desc>

  <!-- Background -->
  <g id="background">
    <rect x="0" y="0" width="800" height="600" fill="#09090b" />
  </g>

  <!-- Header -->
  <g id="header">
    <text x="400" y="46" fill="#f4f4f5" font-size="20" font-weight="700" text-anchor="middle">Every Friction Collapse Reveals a New Scarcity</text>
    <text x="400" y="74" fill="#a1a1aa" font-size="13" text-anchor="middle">The visible event is the collapse. The durable one is what it exposes underneath.</text>
    <text x="240" y="124" fill="#71717a" font-size="12" font-weight="700" letter-spacing="1" text-anchor="middle">FRICTION THAT COLLAPSED</text>
    <text x="600" y="124" fill="#71717a" font-size="12" font-weight="700" letter-spacing="1" text-anchor="middle">SCARCITY REVEALED</text>
  </g>

  <!-- Timeline -->
  <g id="timeline">
    <line x1="46" y1="164" x2="46" y2="424" stroke="#27272a" stroke-width="1.5" />
    <circle cx="46" cy="164" r="3" fill="#52525b" />
    <circle cx="46" cy="216" r="3" fill="#52525b" />
    <circle cx="46" cy="268" r="3" fill="#52525b" />
    <circle cx="46" cy="320" r="3" fill="#52525b" />
    <circle cx="46" cy="372" r="3" fill="#52525b" />
    <circle cx="46" cy="424" r="5" fill="#f59e0b" />
  </g>

  <!-- Row 1 -->
  <g id="row-1">
    <rect rx="6" x="60" y="144" width="360" height="40" fill="#18181b" stroke="#27272a" stroke-width="1" />
    <text x="78" y="169" fill="#e4e4e7" font-size="13" text-anchor="start">Double-entry bookkeeping</text>
    <line x1="424" y1="164" x2="446" y2="164" stroke="#52525b" stroke-width="1.5" />
    <polygon points="446,161 446,167 452,164" fill="#52525b" />
    <rect rx="6" x="452" y="144" width="296" height="40" fill="#18181b" stroke="#27272a" stroke-width="1" />
    <text x="470" y="169" fill="#e4e4e7" font-size="13" text-anchor="start">Deal flow</text>
  </g>

  <!-- Row 2 -->
  <g id="row-2">
    <rect rx="6" x="60" y="196" width="360" height="40" fill="#18181b" stroke="#27272a" stroke-width="1" />
    <text x="78" y="221" fill="#e4e4e7" font-size="13" text-anchor="start">Limited liability</text>
    <line x1="424" y1="216" x2="446" y2="216" stroke="#52525b" stroke-width="1.5" />
    <polygon points="446,213 446,219 452,216" fill="#52525b" />
    <rect rx="6" x="452" y="196" width="296" height="40" fill="#18181b" stroke="#27272a" stroke-width="1" />
    <text x="470" y="221" fill="#e4e4e7" font-size="13" text-anchor="start">Operating skill</text>
  </g>

  <!-- Row 3 -->
  <g id="row-3">
    <rect rx="6" x="60" y="248" width="360" height="40" fill="#18181b" stroke="#27272a" stroke-width="1" />
    <text x="78" y="273" fill="#e4e4e7" font-size="13" text-anchor="start">The assembly line</text>
    <line x1="424" y1="268" x2="446" y2="268" stroke="#52525b" stroke-width="1.5" />
    <polygon points="446,265 446,271 452,268" fill="#52525b" />
    <rect rx="6" x="452" y="248" width="296" height="40" fill="#18181b" stroke="#27272a" stroke-width="1" />
    <text x="470" y="273" fill="#e4e4e7" font-size="13" text-anchor="start">Design and quality</text>
  </g>

  <!-- Row 4 -->
  <g id="row-4">
    <rect rx="6" x="60" y="300" width="360" height="40" fill="#18181b" stroke="#27272a" stroke-width="1" />
    <text x="78" y="325" fill="#e4e4e7" font-size="13" text-anchor="start">Containerization</text>
    <line x1="424" y1="320" x2="446" y2="320" stroke="#52525b" stroke-width="1.5" />
    <polygon points="446,317 446,323 452,320" fill="#52525b" />
    <rect rx="6" x="452" y="300" width="296" height="40" fill="#18181b" stroke="#27272a" stroke-width="1" />
    <text x="470" y="325" fill="#e4e4e7" font-size="13" text-anchor="start">Supply-chain orchestration</text>
  </g>

  <!-- Row 5 -->
  <g id="row-5">
    <rect rx="6" x="60" y="352" width="360" height="40" fill="#18181b" stroke="#27272a" stroke-width="1" />
    <text x="78" y="377" fill="#e4e4e7" font-size="13" text-anchor="start">The internet</text>
    <line x1="424" y1="372" x2="446" y2="372" stroke="#52525b" stroke-width="1.5" />
    <polygon points="446,369 446,375 452,372" fill="#52525b" />
    <rect rx="6" x="452" y="352" width="296" height="40" fill="#18181b" stroke="#27272a" stroke-width="1" />
    <text x="470" y="377" fill="#e4e4e7" font-size="13" text-anchor="start">Attention and curation</text>
  </g>

  <!-- Row 6 (Emphasized) -->
  <g id="row-6">
    <rect rx="6" x="60" y="404" width="360" height="40" fill="#09090b" stroke="#f59e0b" stroke-width="2.5" />
    <text x="78" y="429" fill="#f4f4f5" font-size="13" font-weight="700" text-anchor="start">Cheap AI cognition (LLMs)</text>
    <line x1="424" y1="424" x2="446" y2="424" stroke="#f59e0b" stroke-width="1.5" />
    <polygon points="446,421 446,427 452,424" fill="#f59e0b" />
    <rect rx="6" x="452" y="404" width="296" height="40" fill="#09090b" stroke="#f59e0b" stroke-width="2.5" />
    <text x="470" y="429" fill="#f59e0b" font-size="13" font-weight="700" text-anchor="start">SELECTION</text>
  </g>

  <!-- Pointer -->
  <g id="pointer">
    <polygon points="436,450 430,458 442,458" fill="#f59e0b" />
    <text x="436" y="474" fill="#f59e0b" font-size="12" font-weight="700" text-anchor="middle">you are here</text>
  </g>

  <!-- Footer -->
  <g id="footer">
    <text x="400" y="508" fill="#a1a1aa" font-size="13" text-anchor="middle">Operators who named the new scarcity early compounded for decades.</text>
    <line x1="60" y1="540" x2="748" y2="540" stroke="#27272a" stroke-width="1" />
    <text x="400" y="568" fill="#52525b" font-size="12" text-anchor="middle">templeton.host</text>
  </g>
</svg>